<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>La Churreria La Única - SYNC</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --cactus-dark: #3D4B3F; --cactus-soft: #5B6D5E; 
            --gold: #C5A059; --bg-glass: rgba(255, 255, 255, 0.1);
            --white: #F8F9FA; --danger: #FF6B6B; --success: #51CF66;
        }
        * { box-sizing: border-box; font-family: 'Montserrat', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: radial-gradient(circle at top, var(--cactus-soft), var(--cactus-dark)); color: var(--white); margin: 0; min-height: 100vh; padding-bottom: 90px; }
        header { padding: 20px; text-align: center; background: rgba(0,0,0,0.3); backdrop-filter: blur(10px); border-bottom: 1px solid var(--gold); }
        header h1 { font-size: 0.7rem; letter-spacing: 3px; color: var(--gold); margin: 0; text-transform: uppercase; }
        .container { padding: 15px; display: none; max-width: 480px; margin: auto; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .glass-card { background: var(--bg-glass); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 18px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); margin-bottom: 15px; }
        .btn-gold { background: linear-gradient(135deg, #D4AF37, #B8860B); color: black; border: none; padding: 12px; border-radius: 10px; font-weight: 600; cursor: pointer; width: 100%; margin-top: 8px; }
        .input-dark { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); padding: 12px; border-radius: 10px; color: white; margin: 8px 0; font-size: 1rem; outline: none; }
        .grid-pos { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-item { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 12px; color: white; text-align: center; cursor: pointer; }
        .btn-item span { display: block; font-size: 1.6rem; margin-bottom: 5px; }
        nav { position: fixed; bottom: 0; width: 100%; background: rgba(15,15,15,0.98); display: none; justify-content: space-around; padding: 12px 0; border-top: 1px solid var(--gold); z-index: 999; }
        .nav-item { color: #666; font-size: 0.6rem; text-align: center; cursor: pointer; flex: 1; }
        .nav-item.active { color: var(--gold); }
        .tab-bar { display: flex; overflow-x: auto; gap: 8px; margin-bottom: 15px; padding-bottom: 5px; scrollbar-width: none; }
        .tab-btn { background: none; border: 1px solid var(--gold); color: var(--gold); padding: 6px 12px; border-radius: 20px; font-size: 0.55rem; white-space: nowrap; }
        .tab-btn.active { background: var(--gold); color: black; }
        table { width: 100%; font-size: 0.7rem; border-collapse: collapse; }
        td { padding: 8px 4px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        #sync-status { position: fixed; top: 10px; right: 10px; font-size: 0.5rem; color: #aaa; z-index: 1001; }
        .online { color: #51CF66 !important; }
        .offline { color: #FF6B6B !important; }
    </style>
</head>
<body>

<div id="sync-status">●</div>
<header><h1>La Churreria La Única</h1></header>

<div id="view-login" style="display: flex; flex-direction: column; align-items: center; padding-top: 80px;">
    <div class="glass-card" style="width: 280px; text-align: center;">
        <p style="font-size: 0.8rem; letter-spacing: 1px;">SISTEMA DE GESTIÓN</p>
        <input type="password" id="pin-input" class="input-dark" style="text-align: center;" placeholder="PIN">
        <button onclick="handleLogin()" class="btn-gold">ENTRAR</button>
    </div>
</div>

<div id="view-apertura" class="container">
    <div class="glass-card">
        <h2>Bienvenido</h2>
        <p style="font-size:0.8rem; opacity:0.7;">Fondo de caja hoy:</p>
        <div id="fondo-asignado" style="font-size:2.2rem; color:var(--gold); font-weight:600;">$0</div>
        <button onclick="confirmarApertura()" class="btn-gold">ABRIR TURNO</button>
    </div>
</div>

<div id="view-ventas" class="container">
    <div id="grid-productos" class="grid-pos"></div>
    <div id="cart-list" style="margin: 15px 0; min-height: 40px; border-top: 1px solid rgba(255,255,255,0.1); padding-top:10px;"></div>
    <div class="glass-card">
        <div style="display:flex; justify-content:space-between; margin-bottom:5px;"><span>TOTAL</span> <span id="total-val" style="font-size:1.4rem; color:var(--gold); font-weight:600;">$0</span></div>
        <input type="number" id="pago-val" class="input-dark" placeholder="Paga con..." oninput="calcVuelto()">
        <p style="font-size:0.85rem; margin:10px 0;">Vuelto: <span id="vuelto-val" style="color:var(--success); font-weight:600;">$0</span></p>
        <button onclick="confirmarVenta()" class="btn-gold">FINALIZAR VENTA</button>
        <button onclick="solicitarCierreCaja()" style="margin-top:20px; background:none; border:1px solid var(--danger); color:var(--danger); width:100%; padding:10px; border-radius:10px; font-size:0.65rem; font-weight:600;">GENERAR CIERRE DE CAJA</button>
    </div>
</div>

<div id="view-admin" class="container">
    <div class="tab-bar">
        <button class="tab-btn active" id="tab-v" onclick="changeAdminTab('ventas')">VENTAS</button>
        <button class="tab-btn" id="tab-p" onclick="changeAdminTab('productos')">PRODUCTOS</button>
        <button class="tab-btn" id="tab-s" onclick="changeAdminTab('staff')">STAFF</button>
        <button class="tab-btn" id="tab-f" onclick="changeAdminTab('fondo')">FONDO</button>
    </div>
    <div id="admin-content" class="glass-card"></div>
</div>

<nav id="navbar">
    <div class="nav-item active" id="n-v" onclick="showView('view-ventas', 'n-v')">💰<br>VENTAS</div>
    <div class="nav-item" id="n-a" onclick="checkAdmin()">📊<br>ADMIN</div>
    <div class="nav-item" onclick="location.reload()">🚪<br>SALIR</div>
</nav>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, onSnapshot, query, where, orderBy, doc, updateDoc, deleteDoc, enableNetwork, disableNetwork } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

  // TUS LLAVES DE FIREBASE
  const firebaseConfig = {
    apiKey: "AIzaSyCQEzm6s__cJx2G6_UzBuxh4mmKrhNvAc0",
    authDomain: "churrerialaunica-a2888.firebaseapp.com",
    projectId: "churrerialaunica-a2888",
    storageBucket: "churrerialaunica-a2888.firebasestorage.app",
    messagingSenderId: "721969833627",
    appId: "1:721969833627:web:8c0db201407a05f82c483e"
  };

  const app = initializeApp(firebaseConfig);
  const db_fs = getFirestore(app);

  let cart = []; let currentUser = ""; let currentPin = ""; let currentAdminTab = 'ventas';
  let db_local = { productos: [], staff: [], fondoCaja: 5000 };

  // Sync Status
  const syncStatus = document.getElementById('sync-status');
  const updateStatus = () => {
    if(navigator.onLine) { syncStatus.innerText = "● Online"; syncStatus.className = "online"; enableNetwork(db_fs); }
    else { syncStatus.innerText = "● Offline"; syncStatus.className = "offline"; disableNetwork(db_fs); }
  };
  window.addEventListener('online', updateStatus);
  window.addEventListener('offline', updateStatus);
  updateStatus();

  // Escuchar cambios en la nube
  onSnapshot(collection(db_fs, "productos"), (s) => {
    db_local.productos = s.docs.map(d => ({id_fs: d.id, ...d.data()}));
    renderBotones();
    if(currentAdminTab === 'productos') renderAdminTabs();
  });

  onSnapshot(collection(db_fs, "staff"), (s) => {
    db_local.staff = s.docs.map(d => ({id_fs: d.id, ...d.data()}));
    if(db_local.staff.length === 0) db_local.staff.push({n:"Admin", p:"0000"});
    if(currentAdminTab === 'staff') renderAdminTabs();
  });

  onSnapshot(collection(db_fs, "config"), (s) => {
    s.forEach(d => { if(d.id === "general") { 
        db_local.fondoCaja = d.data().fondoCaja; 
        document.getElementById('fondo-asignado').innerText = "$" + db_local.fondoCaja;
    }});
  });

  // Funciones de la App
  window.handleLogin = () => {
    const pin = document.getElementById('pin-input').value;
    const u = db_local.staff.find(e => e.p === pin);
    if(!u) return alert("PIN incorrecto");
    currentUser = u.n; currentPin = pin;
    document.getElementById('view-login').style.display='none';
    document.getElementById('navbar').style.display='flex';
    document.getElementById('n-a').style.display = (pin === "0000") ? "block" : "none";
    if(pin === "0000") checkAdmin(); else showView('view-apertura');
  };

  window.confirmarApertura = () => showView('view-ventas', 'n-v');

  window.renderBotones = () => {
    document.getElementById('grid-productos').innerHTML = db_local.productos.map(p => `
        <div class="btn-item" onclick="addToCart('${p.n}', ${p.p})"><span>${p.e}</span>${p.n}<br>$${p.p}</div>
    `).join('');
  };

  window.showView = (id, navId) => {
    document.querySelectorAll('.container').forEach(c => c.style.display='none');
    document.getElementById(id).style.display='block';
    if(navId) {
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(navId).classList.add('active');
    }
  };

  window.addToCart = (n, p) => { cart.push({n, p, id: Date.now()}); renderCart(); };
  window.delCart = (id) => { cart = cart.filter(i=>i.id!==id); renderCart(); };
  window.renderCart = () => {
    let t = cart.reduce((a,b)=>a+b.p,0);
    document.getElementById('cart-list').innerHTML = cart.map(i=>`<div style="display:flex; justify-content:space-between; font-size:0.75rem; margin-bottom:5px;"><span>${i.n}</span> <span>$${i.p} <b onclick="delCart(${i.id})" style="color:red; padding-left:10px;">×</b></span></div>`).join('');
    document.getElementById('total-val').innerText = "$"+t;
  };

  window.calcVuelto = () => {
    let t = cart.reduce((a,b)=>a+b.p,0);
    let p = document.getElementById('pago-val').value;
    document.getElementById('vuelto-val').innerText = p > 0 ? "$" + (p - t) : "$0";
  };

  window.confirmarVenta = async () => {
    if(!cart.length) return;
    try {
        await addDoc(collection(db_fs, "ventas"), {
            t: cart.reduce((a,b)=>a+b.p,0), h: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
            f: new Date().toLocaleDateString(), u: currentUser, timestamp: new Date()
        });
        alert("¡Venta Exitosa!"); cart=[]; renderCart(); document.getElementById('pago-val').value="";
    } catch(e) { alert("Error al guardar."); }
  };

  window.solicitarCierreCaja = async () => {
    const cont = prompt("Efectivo real en caja:");
    if(!cont) return;
    const hoy = new Date().toLocaleDateString();
    const snap = await getDocs(query(collection(db_fs, "ventas"), where("f", "==", hoy)));
    const vHoy = snap.docs.reduce((a,b) => a + b.data().t, 0);
    const esperado = vHoy + db_local.fondoCaja;
    let txt = `*CIERRE - LA UNICA*%0A👤 ${currentUser}%0A💰 Ventas: $${vHoy}%0A💵 Fondo: $${db_local.fondoCaja}%0A🏦 Real: $${cont}%0A📉 Dif: $${cont - esperado}`;
    window.location.href = "https://wa.me/?text=" + txt;
  };

  window.checkAdmin = () => { if(currentPin === "0000") { showView('view-admin', 'n-a'); renderAdminTabs(); } };
  window.changeAdminTab = (t) => { currentAdminTab = t; renderAdminTabs(); };

  async function renderAdminTabs() {
    const content = document.getElementById('admin-content');
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + currentAdminTab[0]).classList.add('active');

    if(currentAdminTab === 'ventas') {
        const snap = await getDocs(query(collection(db_fs, "ventas"), where("f", "==", new Date().toLocaleDateString()), orderBy("timestamp", "desc")));
        const vHoy = snap.docs.map(d => d.data());
        content.innerHTML = `<h3>Ventas Hoy: $${vHoy.reduce((a,b)=>a+b.t,0)}</h3><table>` + vHoy.map(v=>`<tr><td>${v.h}</td><td>${v.u}</td><td>$${v.t}</td></tr>`).join('') + `</table>`;
    } 
    else if(currentAdminTab === 'productos') {
        content.innerHTML = `<h3>Productos</h3><button onclick="addP()" class="btn-gold">+ Nuevo</button><table>` + db_local.productos.map(p => `<tr><td>${p.e}</td><td>${p.n}</td><td>$${p.p}</td><td onclick="delP('${p.id_fs}')" style="color:red">×</td></tr>`).join('') + `</table>`;
    }
    else if(currentAdminTab === 'staff') {
        content.innerHTML = `<h3>Equipo</h3><button onclick="addS()" class="btn-gold">+ Staff</button><table>` + db_local.staff.map(s => `<tr><td>${s.n}</td><td>${s.p}</td><td onclick="delS('${s.id_fs}')" style="color:red">×</td></tr>`).join('') + `</table>`;
    }
    else if(currentAdminTab === 'fondo') {
        content.innerHTML = `<h3>Fondo</h3><input type="number" id="nf" class="input-dark" value="${db_local.fondoCaja}"><button onclick="upF()" class="btn-gold">GUARDAR</button>`;
    }
  }

  window.addP = async () => { const e=prompt("Emoji:"), n=prompt("Nombre:"), p=prompt("Precio:"); if(e&&n&&p) await addDoc(collection(db_fs, "productos"), {e,n,p:parseInt(p)}); };
  window.delP = async (id) => { if(confirm("¿Eliminar?")) await deleteDoc(doc(db_fs, "productos", id)); };
  window.addS = async () => { const n=prompt("Nombre:"), p=prompt("PIN:"); if(n&&p) await addDoc(collection(db_fs, "staff"), {n,p}); };
  window.delS = async (id) => { if(confirm("¿Eliminar?")) await deleteDoc(doc(db_fs, "staff", id)); };
  window.upF = async () => { await updateDoc(doc(db_fs, "config", "general"), {fondoCaja: parseInt(document.getElementById('nf').value)}); alert("Ok"); };

</script>
</body>
</html>
