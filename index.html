<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="google" content="notranslate">
    <title>LA ÚNICA - CONTROL V11.3</title>
    <style>
        :root { --cactus: #3D4B3F; --gold: #C5A059; --white: #F8F9FA; --danger: #FF6B6B; --success: #51CF66; --glass: rgba(255,255,255,0.08); }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--cactus); color: var(--white); margin: 0; padding-bottom: 90px; }
        .container { padding: 15px; display: none; max-width: 500px; margin: auto; }
        .glass-card { background: var(--glass); backdrop-filter: blur(15px); border-radius: 20px; padding: 20px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 15px; }
        .btn-gold { background: linear-gradient(135deg, #D4AF37, #B8860B); color: #1a1a1a; border: none; padding: 15px; border-radius: 12px; font-weight: 800; width: 100%; cursor: pointer; text-transform: uppercase; }
        .input-dark { width: 100%; background: rgba(0,0,0,0.4); border: 1px solid var(--gold); padding: 14px; border-radius: 12px; color: white; margin: 10px 0; text-align: center; font-size: 1.1rem; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-box { background: rgba(0,0,0,0.3); padding: 12px; border-radius: 15px; border: 1px solid rgba(197, 160, 89, 0.3); text-align: center; }
        .stat-label { font-size: 0.6rem; text-transform: uppercase; opacity: 0.7; letter-spacing: 1px; }
        .stat-val { font-size: 1.1rem; font-weight: 800; color: var(--gold); margin-top: 5px; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: rgba(255,255,255,0.05); border-radius: 12px; margin-bottom: 8px; border-left: 3px solid var(--gold); }
        .btn-del { background: rgba(255, 107, 107, 0.2); color: var(--danger); border: none; padding: 8px 12px; border-radius: 10px; cursor: pointer; font-size: 1.1rem; }
        .tab-bar { display: flex; gap: 8px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2); background: none; color: white; font-size: 0.7rem; font-weight: 700; }
        .tab-btn.active { background: var(--gold); color: #000; }
        .grid-pos { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn-item { background: var(--glass); border: 1px solid rgba(255,255,255,0.15); border-radius: 18px; padding: 20px 10px; text-align: center; }
        nav { position: fixed; bottom: 0; width: 100%; background: #0a0a0a; display: none; justify-content: space-around; padding: 12px 0; border-top: 1px solid var(--gold); z-index: 1000; }
        .nav-item { text-align: center; font-size: 0.65rem; color: #888; font-weight: 800; }
        .nav-item.active { color: var(--gold); }
        table { width: 100%; border-collapse: collapse; font-size: 0.7rem; }
        th { color: var(--gold); text-align: left; padding: 8px; border-bottom: 1px solid var(--glass); }
        td { padding: 8px; border-bottom: 1px solid var(--glass); }
    </style>
</head>
<body>

<div id="view-login" style="display: flex; flex-direction: column; align-items: center; padding-top: 100px;">
    <div class="glass-card" style="width: 85%; text-align: center;">
        <h1 style="color:var(--gold); margin:0;">LA ÚNICA</h1>
        <input type="password" id="pin-input" class="input-dark" placeholder="PIN" inputmode="numeric">
        <button onclick="handleLogin()" class="btn-gold">ENTRAR</button>
    </div>
</div>

<div id="view-ventas" class="container">
    <h2 id="welcome-msg" style="color:var(--gold); text-align: center; font-size: 1.1rem;"></h2>
    <div id="grid-productos" class="grid-pos"></div>
    <div class="glass-card" style="margin-top:20px;">
        <div id="cart-list"></div>
        <h3 style="text-align:right; margin: 15px 0;">Total: <span id="total-val" style="color:var(--gold); font-size: 1.8rem;">$0</span></h3>
        <select id="metodo-pago" class="input-dark"><option value="Efectivo">💵 EFECTIVO</option><option value="Transferencia">📱 TRANSFERENCIA</option></select>
        <input type="number" id="paga-con" class="input-dark" placeholder="RECIBIDO $" oninput="calcVuelto()">
        <p style="text-align:center; font-size: 0.9rem; opacity: 0.8;">Vuelto: <span id="vuelto-val" style="color:var(--success); font-weight:bold; font-size:1.4rem;">$0</span></p>
        <button onclick="confirmarVenta()" class="btn-gold" style="padding:18px;">✓ CONFIRMAR VENTA</button>
        <button onclick="registrarSalida()" class="btn-gold" style="background:none; border: 1px solid var(--danger); color:var(--danger); margin-top:20px; font-size: 0.7rem; padding: 10px;">CERRAR TURNO</button>
    </div>
</div>

<div id="view-admin" class="container">
    <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab('v', this)">REPORTES</button>
        <button class="tab-btn" onclick="switchTab('s', this)">STAFF</button>
        <button class="tab-btn" onclick="switchTab('p', this)">MENÚ</button>
    </div>
    
    <div id="tab-v" class="admin-tab">
        <div class="glass-card" style="text-align: center;">
            <label style="font-size: 0.8rem; color: var(--gold);">VENTAS POR DÍA:</label>
            <input type="date" id="calendar-filter" class="input-dark" onchange="renderHistorial()">
        </div>
        <div id="report-results" style="display:none;">
            <div id="stats-container" class="stats-grid"></div>
            <div class="glass-card"><div id="historial-list"></div></div>
        </div>
    </div>
    
    <div id="tab-s" class="admin-tab" style="display:none">
        <div class="glass-card">
            <label style="font-size: 0.8rem; color: var(--gold);">HORARIOS POR DÍA:</label>
            <input type="date" id="calendar-staff" class="input-dark" onchange="renderAdminLists()">
        </div>
        <div id="staff-results" style="display:none;">
            <div class="glass-card"><h4>FICHAJES</h4><div id="fichaje-list"></div></div>
        </div>
        <div class="glass-card"><h4>GESTIÓN STAFF</h4><div id="staff-list"></div><button class="btn-gold" onclick="nuevoEmp()">+ AGREGAR</button></div>
    </div>

    <div id="tab-p" class="admin-tab" style="display:none">
        <div class="glass-card"><h4>MENÚ</h4><div id="prod-admin-list"></div><button class="btn-gold" onclick="nuevoProd()">+ AGREGAR AL MENÚ</button></div>
        <button onclick="reiniciarSistema()" class="btn-gold" style="background:var(--danger); color:white; margin-top:30px; font-size:0.6rem; opacity: 0.5;">⚠️ REINICIAR TODO</button>
    </div>
</div>

<nav id="navbar">
    <div class="nav-item" id="nav-v" onclick="showView('view-ventas')">💰 VENTAS</div>
    <div id="nav-admin-btn" class="nav-item" style="display:none" onclick="showView('view-admin')">⚙️ ADMIN</div>
    <div class="nav-item" onclick="location.reload()" style="color:var(--danger)">🚪 SALIR</div>
</nav>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
  import { initializeFirestore, persistentLocalCache, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, deleteDoc, doc, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

  const firebaseConfig = { apiKey: "AIzaSyCQEzm6s__cJx2G6_UzBuxh4mmKrhNvAc0", projectId: "churrerialaunica-a2888", appId: "1:721969833627:web:8c0db201407a05f82c483e" };
  const app = initializeApp(firebaseConfig);
  const db = initializeFirestore(app, { localCache: persistentLocalCache() });

  let user = ""; let db_local = { productos: [], ventas: [], staff: [], fichajes: [] };

  onSnapshot(collection(db, "productos"), (s) => { db_local.productos = s.docs.map(d => ({id: d.id, ...d.data()})); renderProductos(); renderAdminLists(); });
  onSnapshot(collection(db, "staff"), (s) => { db_local.staff = s.docs.map(d => ({id: d.id, ...d.data()})); renderAdminLists(); });
  onSnapshot(query(collection(db, "ventas"), orderBy("ts", "desc")), (s) => { db_local.ventas = s.docs.map(d => d.data()); renderHistorial(); });
  onSnapshot(query(collection(db, "fichajes"), orderBy("ts", "asc")), (s) => { db_local.fichajes = s.docs.map(d => ({id: d.id, ...d.data()})); renderAdminLists(); });

  window.handleLogin = async () => {
    const pin = document.getElementById('pin-input').value;
    const pinAdmin = "325606";
    const emp = db_local.staff.find(x => x.p === pin);
    if(!emp && pin !== pinAdmin) return alert("PIN INCORRECTO");
    
    user = (pin === pinAdmin) ? "Admin" : emp.n;
    document.getElementById('view-login').style.display = 'none';
    document.getElementById('navbar').style.display = 'flex';

    if(user === "Admin") {
        document.getElementById('nav-admin-btn').style.display = 'block';
        showView('view-admin');
    } else {
        showView('view-ventas');
        document.getElementById('welcome-msg').innerText = "HOLA, " + user.toUpperCase();
        
        // SEGURIDAD: Solo registra ENTRADA si no existe una hoy
        const hoy = new Date().toLocaleDateString('es-ES');
        const yaEntro = db_local.fichajes.some(f => f.u === user && f.f === hoy && f.tipo === "ENTRADA");
        
        if(!yaEntro) {
            await addDoc(collection(db, "fichajes"), { 
                u: user, f: hoy, 
                h: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}), 
                tipo: "ENTRADA", ts: serverTimestamp() 
            });
        }
    }
  };

  window.registrarSalida = async () => {
    const ahora = new Date();
    const hora = ahora.getHours();
    const min = ahora.getMinutes();
    const tiempoActual = hora * 100 + min; // Ejemplo: 11:20 -> 1120

    // VALIDACIÓN DE HORARIOS DE CIERRE
    if (hora < 14) { // Turno Mañana
        if (tiempoActual < 1120) return alert("⚠️ No podés cerrar el turno mañana antes de las 11:20 hs.");
    } else { // Turno Tarde
        if (tiempoActual < 1900) return alert("⚠️ No podés cerrar el turno tarde antes de las 19:00 hs.");
    }

    if(confirm("¿CONFIRMAR CIERRE DE TURNO?")){ 
        await addDoc(collection(db, "fichajes"), { 
            u: user, f: ahora.toLocaleDateString('es-ES'), 
            h: ahora.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}), 
            tipo: "SALIDA", ts: serverTimestamp() 
        }); 
        location.reload(); 
    }
  };

  // --- RESTO DE FUNCIONES MANTENIDAS ---
  window.renderProductos = () => { document.getElementById('grid-productos').innerHTML = db_local.productos.map(p => `<div class="btn-item" onclick="addCart('${p.n}', ${p.p})"><span>🍩</span>${p.n}<br>$${p.p}</div>`).join(''); };
  let cart = [];
  window.addCart = (n, p) => { cart.push({n, p}); renderCart(); };
  window.borrarDelCarrito = (i) => { cart.splice(i, 1); renderCart(); };
  window.renderCart = () => {
    document.getElementById('cart-list').innerHTML = cart.map((item, i) => `<div class="cart-row"><span>${item.n} ($${item.p})</span><button class="btn-del" onclick="borrarDelCarrito(${i})">🗑</button></div>`).join('');
    const t = cart.reduce((a,b)=>a+b.p, 0); document.getElementById('total-val').innerText = "$"+t; calcVuelto();
  }
  window.calcVuelto = () => { const t = cart.reduce((a,b)=>a+b.p, 0); const p = document.getElementById('paga-con').value || 0; document.getElementById('vuelto-val').innerText = "$" + Math.max(0, p - t); };
  window.confirmarVenta = async () => {
    if(!cart.length) return;
    const ahora = new Date();
    await addDoc(collection(db, "ventas"), { t: cart.reduce((a,b)=>a+b.p,0), u: user, m: document.getElementById('metodo-pago').value, f: ahora.toLocaleDateString('es-ES'), h: ahora.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}), turno: ahora.getHours() < 14 ? "Mañana" : "Tarde", ts: serverTimestamp() });
    cart = []; document.getElementById('paga-con').value = ""; renderCart(); alert("VENTA CONFIRMADA");
  };

  window.renderHistorial = () => {
    const dateVal = document.getElementById('calendar-filter').value;
    if(!dateVal) return document.getElementById('report-results').style.display = 'none';
    document.getElementById('report-results').style.display = 'block';
    const selDate = new Date(dateVal + "T00:00:00");
    const selStr = selDate.toLocaleDateString('es-ES');
    const vDia = db_local.ventas.filter(v => v.f === selStr);
    const m = vDia.filter(v => v.turno === "Mañana").reduce((a,b)=>a+b.t,0);
    const t = vDia.filter(v => v.turno === "Tarde").reduce((a,b)=>a+b.t,0);
    const vSem = db_local.ventas.filter(v => { const p = v.f.split('/'); const fv = new Date(p[2], p[1]-1, p[0]); return fv >= new Date(selDate.setDate(selDate.getDate()-selDate.getDay())) && fv <= new Date(selDate.setDate(selDate.getDate()+6)); }).reduce((a,b)=>a+b.t,0);
    const vMes = db_local.ventas.filter(v => { const p = v.f.split('/'); return parseInt(p[1]) === (new Date(dateVal+"T00:00:00").getMonth()+1); }).reduce((a,b)=>a+b.t,0);
    document.getElementById('stats-container').innerHTML = `<div class="stat-box" style="grid-column: span 2; background: rgba(197, 160, 89, 0.1);"><div class="stat-label">TOTAL DÍA</div><div class="stat-val">$${m+t}</div></div><div class="stat-box"><div class="stat-label">MAÑANA</div><div class="stat-val" style="color:#51CF66">$${m}</div></div><div class="stat-box"><div class="stat-label">TARDE</div><div class="stat-val" style="color:#FFD43B">$${t}</div></div><div class="stat-box"><div class="stat-label">SEMANA</div><div class="stat-val" style="font-size:0.9rem">$${vSem}</div></div><div class="stat-box"><div class="stat-label">MES</div><div class="stat-val" style="font-size:0.9rem">$${vMes}</div></div>`;
    document.getElementById('historial-list').innerHTML = `<h4>VENTAS DEL DÍA</h4><table>` + (vDia.length ? vDia.map(v => `<tr><td>${v.h} (${v.turno[0]})</td><td>${v.m}</td><td style="font-weight:bold">$${v.t}</td></tr>`).join('') : '<tr><td>No hay ventas</td></tr>') + `</table>`;
  };

  window.renderAdminLists = () => {
    document.getElementById('staff-list').innerHTML = db_local.staff.map(s => `<div class="list-item"><span>${s.n} (PIN: ${s.p})</span><button class="btn-del" onclick="delDoc('staff','${s.id}')">🗑</button></div>`).join('');
    document.getElementById('prod-admin-list').innerHTML = db_local.productos.map(p => `<div class="list-item"><span>🍩 ${p.n} ($${p.p})</span><button class="btn-del" onclick="delDoc('productos','${p.id}')">🗑</button></div>`).join('');
    const dateStaff = document.getElementById('calendar-staff').value;
    if(!dateStaff) return document.getElementById('staff-results').style.display = 'none';
    document.getElementById('staff-results').style.display = 'block';
    const selStr = new Date(dateStaff + "T00:00:00").toLocaleDateString('es-ES');
    const fDia = db_local.fichajes.filter(f => f.f === selStr);
    const resumen = {};
    fDia.forEach(f => {
        if(!resumen[f.u]) resumen[f.u] = { e: '-', s: '-', h: '-' };
        if(f.tipo === "ENTRADA") resumen[f.u].e = f.h;
        if(f.tipo === "SALIDA") {
            resumen[f.u].s = f.h;
            if(resumen[f.u].e !== '-') {
                const [hE, mE] = resumen[f.u].e.split(':'); const [hS, mS] = f.h.split(':');
                const min = (parseInt(hS)*60+parseInt(mS)) - (parseInt(hE)*60+parseInt(mE));
                resumen[f.u].h = (min/60).toFixed(1) + "h";
            }
        }
    });
    let html = `<table><tr><th>EMP</th><th>ENTRADA</th><th>SALIDA</th><th>TOTAL</th></tr>`;
    for(let e in resumen) html += `<tr><td>${e}</td><td style="color:#51CF66">${resumen[e].e}</td><td style="color:#FF6B6B">${resumen[e].s}</td><td style="font-weight:bold">${resumen[e].h}</td></tr>`;
    document.getElementById('fichaje-list').innerHTML = html + `</table>`;
  }

  window.switchTab = (t, btn) => { document.querySelectorAll('.admin-tab').forEach(x => x.style.display = 'none'); document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active')); document.getElementById('tab-'+t).style.display = 'block'; btn.classList.add('active'); };
  window.delDoc = async (col, id) => { if(confirm("¿Eliminar?")) await deleteDoc(doc(db, col, id)); };
  window.reiniciarSistema = async () => { if(confirm("⚠️ ¿BORRAR TODO?")){ const b = writeBatch(db); (await getDocs(collection(db, "ventas"))).forEach(d => b.delete(d.ref)); (await getDocs(collection(db, "fichajes"))).forEach(d => b.delete(d.ref)); await b.commit(); alert("SISTEMA REINICIADO"); } };
  window.nuevoEmp = async () => { const n = prompt("Nombre:"); const p = prompt("PIN:"); if(n && p) await addDoc(collection(db, "staff"), { n, p }); };
  window.nuevoProd = async () => { const n = prompt("Producto:"); const p = parseInt(prompt("Precio:")); if(n && p) await addDoc(collection(db, "productos"), { n, p }); };
  window.showView = (id) => { document.querySelectorAll('.container').forEach(c => c.style.display = 'none'); document.getElementById(id).style.display = 'block'; document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); if(id === 'view-ventas') document.getElementById('nav-v').classList.add('active'); if(id === 'view-admin') { document.getElementById('nav-admin-btn').classList.add('active'); renderAdminLists(); renderHistorial(); } };
</script>
</body>
</html>
