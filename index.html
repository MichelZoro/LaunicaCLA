<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LA ÚNICA - CONTROL TOTAL V13.5</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { 
            --cactus: #2D362F; 
            --gold: #C5A059; 
            --white: #F8F9FA; 
            --danger: #FF6B6B; 
            --success: #51CF66; 
            --glass: rgba(255,255,255,0.08);
            --glass-heavy: rgba(0,0,0,0.5);
            --border: rgba(197, 160, 89, 0.25);
        }
        
        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: radial-gradient(circle at top, #3d4940, var(--cactus)); 
            color: var(--white); 
            margin: 0; 
            padding-bottom: 100px; 
            min-height: 100vh;
        }

        .container { padding: 20px; display: none; max-width: 500px; margin: auto; animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .glass-card { 
            background: var(--glass); 
            backdrop-filter: blur(25px); 
            -webkit-backdrop-filter: blur(25px);
            border-radius: 24px; 
            padding: 20px; 
            border: 1px solid var(--border); 
            margin-bottom: 18px; 
            box-shadow: 0 12px 40px rgba(0,0,0,0.4); 
        }
        
        .btn-gold { 
            background: linear-gradient(145deg, #D4AF37, #C5A059); 
            color: #1a1a1a; 
            border: none; 
            padding: 16px; 
            border-radius: 16px; 
            font-weight: 800; 
            width: 100%; 
            cursor: pointer; 
            font-size: 0.9rem;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(197, 160, 89, 0.3);
            transition: 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-gold:active { transform: scale(0.96); }

        .btn-del {
            background: rgba(255, 107, 107, 0.1);
            color: var(--danger);
            border: 1px solid rgba(255, 107, 107, 0.2);
            border-radius: 12px;
            padding: 8px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .input-dark { 
            width: 100%; 
            background: var(--glass-heavy); 
            border: 1px solid var(--border); 
            padding: 14px; 
            border-radius: 14px; 
            color: white; 
            margin: 8px 0; 
            font-size: 1rem;
            outline: none;
        }
        .input-dark:focus { border-color: var(--gold); box-shadow: 0 0 10px rgba(197, 160, 89, 0.2); }
        
        .nav-tabs { 
            display: flex; gap: 8px; margin-bottom: 20px; background: rgba(0,0,0,0.3); padding: 8px; border-radius: 18px; border: 1px solid var(--border);
        }
        .tab-btn { 
            flex: 1; padding: 12px 5px; border-radius: 12px; border: none; background: transparent; 
            color: #999; font-weight: 700; cursor: pointer; font-size: 0.65rem; transition: 0.3s;
            display: flex; flex-direction: column; align-items: center; gap: 4px;
        }
        .tab-btn i { font-size: 1.2rem; }
        .tab-btn.active { background: var(--gold); color: #1a1a1a; }

        .btn-item { 
            width: 48%; background: var(--glass); border: 1px solid var(--border); 
            border-radius: 22px; padding: 20px 10px; text-align: center; margin-bottom: 12px;
        }

        .list-item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px; background: rgba(255,255,255,0.03); border-radius: 16px; 
            margin-bottom: 10px; border-left: 4px solid var(--gold); 
        }

        .stat-box { background: rgba(0,0,0,0.4); padding: 15px; border-radius: 20px; border: 1px solid var(--border); text-align: center; margin-bottom: 10px; }
        .stat-val { font-size: 1.5rem; font-weight: 800; color: var(--gold); }
        .stat-label { font-size: 0.7rem; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }

        nav { 
            position: fixed; bottom: 0; width: 100%; 
            background: rgba(20, 24, 21, 0.95); backdrop-filter: blur(15px);
            display: none; justify-content: space-around; 
            padding: 12px 0 25px 0; border-top: 1px solid var(--border); z-index: 1000; 
        }
        .nav-item { text-align: center; font-size: 0.7rem; color: #777; font-weight: 700; cursor: pointer; flex:1; transition: 0.3s; }
        .nav-item.active { color: var(--gold); }

        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); backdrop-filter: blur(8px); z-index: 2000; display:none; justify-content:center; align-items:center; }
        .modal-content { background: var(--cactus); padding: 25px; border-radius: 28px; width: 90%; max-width: 400px; border: 1px solid var(--gold); }
    </style>
</head>
<body>

<div id="view-login" style="padding-top: 100px; text-align: center;">
    <div class="glass-card" style="width: 85%; margin: auto;">
        <i data-lucide="chef-hat" style="width: 50px; height: 50px; color: var(--gold); margin-bottom: 15px;"></i>
        <h1 style="color:var(--gold); letter-spacing: 4px; margin:0; font-size: 1.8rem;">LA ÚNICA</h1>
        <p style="font-size: 0.7rem; opacity: 0.6; margin-bottom: 25px; letter-spacing: 1px;">SISTEMA DE GESTIÓN EMPRESARIAL</p>
        <input type="password" id="pin-input" class="input-dark" placeholder="PIN DE ACCESO" inputmode="numeric" style="text-align: center; letter-spacing: 8px; font-size: 1.5rem;">
        <button onclick="handleLogin()" class="btn-gold" style="margin-top: 20px;">INICIAR SESIÓN</button>
    </div>
</div>

<div id="view-admin" class="container">
    <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 15px;">
        <i data-lucide="calendar" style="color:var(--gold); width: 20px;"></i>
        <input type="date" id="calendar-filter" class="input-dark" onchange="renderAllViews()" style="margin:0;">
    </div>

    <div class="nav-tabs">
        <button class="tab-btn active" id="btn-tab-v" onclick="switchAdminTab('v')"><i data-lucide="bar-chart-3"></i>VENTAS</button>
        <button class="tab-btn" id="btn-tab-g" onclick="switchAdminTab('g')"><i data-lucide="package"></i>PROD.</button>
        <button class="tab-btn" id="btn-tab-f" onclick="switchAdminTab('f')"><i data-lucide="building-2"></i>FIJOS</button>
        <button class="tab-btn" id="btn-tab-s" onclick="switchAdminTab('s')"><i data-lucide="users"></i>STAFF</button>
        <button class="tab-btn" id="btn-tab-p" onclick="switchAdminTab('p')"><i data-lucide="utensils"></i>MENÚ</button>
    </div>

    <div id="tab-v" class="admin-content">
        <div id="stats-container"></div>
        <div id="historial-list" class="glass-card"></div>
    </div>

    <div id="tab-g" class="admin-content" style="display:none">
        <div class="nav-tabs" style="background: rgba(255,255,255,0.05); margin-bottom: 15px;">
            <button class="tab-btn active" id="btn-sub-precios" onclick="switchSubTab('precios')">INVENTARIO</button>
            <button class="tab-btn" id="btn-sub-produccion" onclick="switchSubTab('produccion')">FABRICACIÓN</button>
        </div>
        <div id="sub-precios">
            <div id="insumos-list"></div>
            <button class="btn-gold" onclick="nuevoInsumo()"><i data-lucide="plus"></i> CARGAR INSUMO</button>
        </div>
        <div id="sub-produccion" style="display:none">
            <div class="glass-card">
                <h4 style="margin-top:0; color:var(--gold); text-align:center;">NUEVA TANDA</h4>
                <input type="text" id="nombre-produccion" class="input-dark" placeholder="Producto (Ej: Churros)">
                <div id="receta-inputs"></div>
                <input type="number" id="cant-producida" class="input-dark" placeholder="Unidades obtenidas">
                <div id="resultado-produccion" class="glass-card" style="background:rgba(0,0,0,0.2); display:none;">
                    <p style="margin:5px 0; font-size:0.85rem;">Costo Total: <b id="costo-tanda-total" style="color:var(--danger)"></b></p>
                    <p style="margin:5px 0; font-size:0.85rem;">Costo Unidad: <b id="costo-por-unidad" style="color:var(--success)"></b></p>
                </div>
                <div style="display:flex; gap:8px;">
                    <button class="btn-gold" onclick="calcularProduccion()">CALCULAR</button>
                    <button class="btn-gold" onclick="guardarProduccion()" style="background:var(--success); color:black;">GUARDAR</button>
                </div>
            </div>
            <div id="produccion-empleados-list"></div>
            <div id="produccion-dia-list"></div>
        </div>
    </div>

    <div id="tab-f" class="admin-content" style="display:none">
        <div class="glass-card">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <span style="font-size:0.85rem">Días laborables:</span>
                <input type="number" id="dias-trabajo" class="input-dark" value="24" oninput="renderAllViews()" style="width:70px; text-align:center; margin:0;">
            </div>
        </div>
        <div id="fijos-resumen"></div>
        <div id="fijos-list"></div>
        <button class="btn-gold" onclick="nuevoGastoFijo()"><i data-lucide="plus"></i> CARGAR GASTO FIJO</button>
    </div>

    <div id="tab-s" class="admin-content" style="display:none"><div id="fichaje-list"></div><div id="staff-list"></div><button class="btn-gold" onclick="nuevoEmp()">+ AGREGAR EMPLEADO</button></div>
    <div id="tab-p" class="admin-content" style="display:none"><div id="prod-admin-list"></div><button class="btn-gold" onclick="nuevoProd()">+ AGREGAR AL MENÚ</button></div>
</div>

<div id="view-ventas" class="container">
    <h2 id="welcome-msg" style="color:var(--gold); font-size: 1.2rem;"></h2>
    <div id="grid-productos" style="display: flex; flex-wrap: wrap; justify-content: space-between;"></div>
    <div class="glass-card">
        <div id="cart-list"></div>
        <div style="display:flex; justify-content:space-between; align-items:center; margin:20px 0;">
            <span style="opacity:0.7">TOTAL</span>
            <span id="total-val" style="color:var(--gold); font-size: 2.2rem; font-weight: 800;">$0</span>
        </div>
        <button onclick="confirmarVenta()" class="btn-gold" style="font-size:1.1rem; padding:20px;">FINALIZAR VENTA</button>
        <button onclick="ficharSalida()" style="background:none; border:none; color:var(--danger); width:100%; margin-top:20px; font-weight:bold;">CERRAR TURNO</button>
    </div>
</div>

<nav id="navbar">
    <div id="nav-ventas-btn" class="nav-item active" onclick="showView('view-ventas')"><i data-lucide="shopping-cart"></i><br>CAJA</div>
    <div id="nav-admin-btn" class="nav-item" style="display:none" onclick="showView('view-admin')"><i data-lucide="settings"></i><br>ADMIN</div>
    <div class="nav-item" onclick="location.reload()" style="color:var(--danger)"><i data-lucide="log-out"></i><br>SALIR</div>
</nav>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCQEzm6s__cJx2G6_UzBuxh4mmKrhNvAc0", projectId: "churrerialaunica-a2888", appId: "1:721969833627:web:8c0db201407a05f82c483e" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    db.enablePersistence().catch(() => {});

    let user = ""; let cart = [];
    let db_local = { productos: [], ventas: [], gastos: [], produccion: [], gastos_fijos: [], staff: [], fichajes: [], insumos: [], reportes_emp: [] };

    document.getElementById('calendar-filter').value = new Date().toISOString().split('T')[0];

    // Snapshot Listeners
    db.collection("productos").onSnapshot(s => { db_local.productos = s.docs.map(d => ({...d.data(), id: d.id})); renderProductos(); renderAdminLists(); });
    db.collection("staff").onSnapshot(s => { db_local.staff = s.docs.map(d => ({...d.data(), id: d.id})); });
    db.collection("insumos").onSnapshot(s => { db_local.insumos = s.docs.map(d => ({...d.data(), id: d.id})); renderInsumos(); renderRecetaInputs(); });
    db.collection("ventas").onSnapshot(s => { db_local.ventas = s.docs.map(d => d.data()); renderAllViews(); });
    db.collection("gastos_fijos").onSnapshot(s => { db_local.gastos_fijos = s.docs.map(d => ({...d.data(), id: d.id})); renderGastosFijos(); });
    db.collection("reportes_produccion").onSnapshot(s => { db_local.reportes_emp = s.docs.map(d => ({...d.data(), id: d.id})); });

    function handleLogin() {
        const pin = document.getElementById('pin-input').value;
        const found = db_local.staff.find(s => s.p === pin);
        if(!found && pin !== "325606") return alert("PIN INCORRECTO");
        user = (pin === "325606") ? "Admin" : found.n;
        document.getElementById('navbar').style.display = 'flex';
        lucide.createIcons();
        if(user === "Admin") {
            document.getElementById('nav-ventas-btn').style.display = 'none';
            document.getElementById('nav-admin-btn').style.display = 'block';
            showView('view-admin');
            switchAdminTab('v');
        } else {
            showView('view-ventas');
            document.getElementById('welcome-msg').innerText = "HOLA, " + user.toUpperCase();
        }
    }

    // --- CORRECCIÓN NAVEGACIÓN ---
    function switchAdminTab(tab) {
        document.querySelectorAll('.admin-content').forEach(c => c.style.display = 'none');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + tab).style.display = 'block';
        document.getElementById('btn-tab-' + tab).classList.add('active');
    }

    function switchSubTab(sub) {
        document.getElementById('sub-precios').style.display = (sub === 'precios') ? 'block' : 'none';
        document.getElementById('sub-produccion').style.display = (sub === 'produccion') ? 'block' : 'none';
        document.getElementById('btn-sub-precios').classList.toggle('active', sub === 'precios');
        document.getElementById('btn-sub-produccion').classList.toggle('active', sub === 'produccion');
    }

    function showView(id) {
        document.querySelectorAll('.container, #view-login').forEach(v => v.style.display = 'none');
        document.getElementById(id).style.display = 'block';
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        if(id === 'view-admin') document.getElementById('nav-admin-btn').classList.add('active');
        if(id === 'view-ventas') document.getElementById('nav-ventas-btn').classList.add('active');
    }

    // --- CORRECCIÓN COSTOS FIJOS (EDITAR) ---
    function renderGastosFijos() {
        let totalF = db_local.gastos_fijos.reduce((a,b)=>a+b.m, 0);
        let dias = parseInt(document.getElementById('dias-trabajo').value) || 24;
        document.getElementById('fijos-list').innerHTML = db_local.gastos_fijos.map(g => `
            <div class="list-item">
                <div onclick="editarGastoFijo('${g.id}', '${g.n}', ${g.m})">
                    <b>${g.n}</b><br><small>$${g.m}</small>
                </div>
                <button class="btn-del" onclick="borrarDoc('gastos_fijos','${g.id}')">🗑️</button>
            </div>`).join('');
        document.getElementById('fijos-resumen').innerHTML = `<div class="stat-box"><div class="stat-label">FIJO DIARIO</div><div class="stat-val">$${(totalF/dias).toFixed(2)}</div></div>`;
    }

    window.editarGastoFijo = (id, n, m) => {
        let nuevoN = prompt("Nombre del gasto:", n);
        let nuevoM = parseFloat(prompt("Monto mensual:", m));
        if(nuevoN && !isNaN(nuevoM)) db.collection("gastos_fijos").doc(id).update({n: nuevoN.toUpperCase(), m: nuevoM});
    };

    window.nuevoGastoFijo = () => {
        let n = prompt("Gasto:");
        let m = parseFloat(prompt("Monto:"));
        if(n && m) db.collection("gastos_fijos").add({n: n.toUpperCase(), m});
    };

    // --- REFINAMIENTO DE UI ---
    function renderProductos() {
        document.getElementById('grid-productos').innerHTML = db_local.productos.map(p => `
            <div class="btn-item" onclick="addCart('${p.n}',${p.p})">
                <div style="font-size:1.5rem; margin-bottom:5px;">🍩</div>
                <div style="font-size:0.8rem; font-weight:700;">${p.n}</div>
                <div style="color:var(--gold);">$${p.p}</div>
            </div>`).join('');
    }

    function renderAdminLists() {
        document.getElementById('staff-list').innerHTML = "<h4>PERSONAL</h4>" + db_local.staff.map(s => `<div class="list-item"><span>${s.n}</span> <button class="btn-del" onclick="borrarDoc('staff','${s.id}')">ELIMINAR</button></div>`).join('');
        document.getElementById('prod-admin-list').innerHTML = "<h4>MENÚ</h4>" + db_local.productos.map(p => `<div class="list-item"><span>${p.n} ($${p.p})</span> <button class="btn-del" onclick="borrarDoc('productos','${p.id}')">ELIMINAR</button></div>`).join('');
    }

    window.borrarDoc = (c, i) => confirm("¿ELIMINAR?") && db.collection(c).doc(i).delete();

    // Inicializar iconos al cargar
    window.onload = () => lucide.createIcons();

    // El resto de tus funciones de lógica de negocio (calcularProduccion, confirmarVenta, etc.) se mantienen igual.
    // Asegúrate de copiar las funciones de cálculo que ya tenías funcionando.
    
    function addCart(n, p) { cart.push({n, p}); renderCart(); }
    function renderCart() {
        let t = cart.reduce((a,b)=>a+b.p,0);
        document.getElementById('cart-list').innerHTML = cart.map((it, i) => `<div class="list-item">${it.n} <b>$${it.p}</b> <button onclick="cart.splice(${i},1);renderCart()">✕</button></div>`).join('');
        document.getElementById('total-val').innerText = "$"+t;
    }

    function renderInsumos() { 
        document.getElementById('insumos-list').innerHTML = db_local.insumos.map(i => `<div class="list-item"><span>${i.n}</span><b>$${i.cu.toFixed(2)}/${i.u}</b></div>`).join(''); 
    }
    
    function renderRecetaInputs() { 
        document.getElementById('receta-inputs').innerHTML = db_local.insumos.map(i => `
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                <span style="font-size:0.8rem;">${i.n}</span>
                <input type="number" step="0.01" class="input-dark receta-cant" data-cu="${i.cu}" style="width:80px; padding:5px; margin:0;">
            </div>`).join(''); 
    }

    let ultC = 0;
    window.calcularProduccion = () => {
        let t = 0; document.querySelectorAll('.receta-cant').forEach(i => t += (parseFloat(i.value)||0)*parseFloat(i.dataset.cu));
        ultC = t;
        let u = parseFloat(document.getElementById('cant-producida').value)||1;
        document.getElementById('resultado-produccion').style.display = 'block';
        document.getElementById('costo-tanda-total').innerText = "$"+t.toFixed(2);
        document.getElementById('costo-por-unidad').innerText = "$"+(t/u).toFixed(2);
    };

    window.renderAllViews = () => {
        if(user === "Admin") {
            const val = document.getElementById('calendar-filter').value;
            const [y, m, d] = val.split('-');
            const fBus = `${parseInt(d)}/${parseInt(m)}/${y}`;
            const vD = db_local.ventas.filter(v => v.f === fBus);
            let total = vD.reduce((a,b)=>a+b.t,0);
            document.getElementById('stats-container').innerHTML = `<div class="stat-box"><div class="stat-label">VENTAS DEL DÍA</div><div class="stat-val">$${total}</div></div>`;
        }
    };
</script>
</body>
</html>
