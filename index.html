<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="google" content="notranslate">
    <title>LA ÚNICA - CONTROL V10.1</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --cactus: #3D4B3F; --gold: #C5A059; --white: #F8F9FA; --danger: #FF6B6B; --success: #51CF66; --glass: rgba(255,255,255,0.08); }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--cactus); color: var(--white); margin: 0; padding-bottom: 90px; }
        .container { padding: 15px; display: none; max-width: 500px; margin: auto; }
        .glass-card { background: var(--glass); backdrop-filter: blur(15px); border-radius: 20px; padding: 20px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 15px; }
        .btn-gold { background: linear-gradient(135deg, #D4AF37, #B8860B); color: #1a1a1a; border: none; padding: 15px; border-radius: 12px; font-weight: 800; width: 100%; cursor: pointer; text-transform: uppercase; }
        .input-dark { width: 100%; background: rgba(0,0,0,0.4); border: 1px solid var(--gold); padding: 14px; border-radius: 12px; color: white; margin: 10px 0; text-align: center; font-size: 1.1rem; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-box { background: rgba(0,0,0,0.3); padding: 12px; border-radius: 15px; border: 1px solid rgba(197, 160, 89, 0.3); text-align: center; }
        .stat-label { font-size: 0.65rem; text-transform: uppercase; opacity: 0.7; }
        .stat-val { font-size: 1.2rem; font-weight: 800; color: var(--gold); margin-top: 5px; }
        .grid-pos { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn-item { background: var(--glass); border: 1px solid rgba(255,255,255,0.15); border-radius: 18px; padding: 20px 10px; text-align: center; }
        nav { position: fixed; bottom: 0; width: 100%; background: #0a0a0a; display: none; justify-content: space-around; padding: 12px 0; border-top: 1px solid var(--gold); z-index: 1000; }
        .nav-item { text-align: center; font-size: 0.65rem; color: #888; font-weight: 800; }
        .nav-item.active { color: var(--gold); }
        table { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
        th { color: var(--gold); text-align: left; padding: 10px; border-bottom: 1px solid var(--glass); }
        td { padding: 10px; border-bottom: 1px solid var(--glass); }
        .cart-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .btn-del { background: rgba(255, 107, 107, 0.2); color: var(--danger); border: none; padding: 8px; border-radius: 8px; cursor: pointer; font-size: 1rem; }
    </style>
</head>
<body>

<div id="view-login" style="display: flex; flex-direction: column; align-items: center; padding-top: 100px;">
    <div class="glass-card" style="width: 85%; text-align: center;">
        <h1 style="color:var(--gold); margin:0;">LA ÚNICA</h1>
        <input type="password" id="pin-input" class="input-dark" placeholder="PIN" inputmode="numeric">
        <button onclick="handleLogin()" class="btn-gold">ENTRAR</button>
    </div>
</div>

<div id="view-ventas" class="container">
    <h2 id="welcome-msg" style="color:var(--gold); text-align: center; font-size: 1.1rem;"></h2>
    <div id="grid-productos" class="grid-pos"></div>
    <div class="glass-card" style="margin-top:20px;">
        <div id="cart-list"></div>
        <h3 style="text-align:right; margin: 15px 0;">Total: <span id="total-val" style="color:var(--gold); font-size: 1.8rem;">$0</span></h3>
        <select id="metodo-pago" class="input-dark"><option value="Efectivo">💵 EFECTIVO</option><option value="Transferencia">📱 TRANSFERENCIA</option></select>
        <input type="number" id="paga-con" class="input-dark" placeholder="RECIBIDO $" oninput="calcVuelto()">
        <p style="text-align:center; font-size: 0.9rem; opacity: 0.8;">Vuelto: <span id="vuelto-val" style="color:var(--success); font-weight:bold; font-size:1.4rem;">$0</span></p>
        <button onclick="confirmarVenta()" class="btn-gold" style="padding:18px;">✓ CONFIRMAR VENTA</button>
        <button onclick="registrarSalida()" class="btn-gold" style="background:none; border: 1px solid var(--danger); color:var(--danger); margin-top:20px; font-size: 0.7rem; padding: 10px;">CERRAR TURNO</button>
    </div>
</div>

<div id="view-admin" class="container">
    <div class="stats-grid">
        <div class="stat-box"><div class="stat-label">Total Recaudado</div><div class="stat-val" id="res-dinero">$0</div></div>
        <div class="stat-box"><div class="stat-label">Ventas</div><div class="stat-val" id="res-cant">0</div></div>
    </div>
    <div class="glass-card">
        <select id="filtro-h" class="input-dark" onchange="renderHistorial()"><option value="hoy">HOY</option><option value="siempre">TODO EL HISTORIAL</option></select>
        <div id="historial-list"></div>
    </div>
    <button onclick="showView('view-ventas')" class="btn-gold" style="margin-top:10px;">VOLVER A VENTAS</button>
</div>

<nav id="navbar">
    <div class="nav-item active" id="nav-v" onclick="showView('view-ventas')">💰 VENTAS</div>
    <div id="nav-admin-btn" class="nav-item" style="display:none" onclick="showView('view-admin')">⚙️ ADMIN</div>
    <div class="nav-item" onclick="location.reload()" style="color:var(--danger)">🚪 SALIR</div>
</nav>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
  import { initializeFirestore, persistentLocalCache, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, deleteDoc, doc, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

  const firebaseConfig = { apiKey: "AIzaSyCQEzm6s__cJx2G6_UzBuxh4mmKrhNvAc0", projectId: "churrerialaunica-a2888", appId: "1:721969833627:web:8c0db201407a05f82c483e" };
  const app = initializeApp(firebaseConfig);
  const db = initializeFirestore(app, { localCache: persistentLocalCache() });

  let user = ""; let cart = []; let db_local = { productos: [], ventas: [], staff: [] };
  
  // ¡CAMBIÁ ESTO POR TU NÚMERO REAL!
  const MI_WHATSAPP = "5491100000000"; 

  onSnapshot(collection(db, "productos"), (s) => { 
    db_local.productos = s.docs.map(d => ({id: d.id, ...d.data()})); 
    renderProductos(); 
  });
  
  onSnapshot(collection(db, "staff"), (s) => { 
    db_local.staff = s.docs.map(d => ({id: d.id, ...d.data()})); 
  });
  
  onSnapshot(query(collection(db, "ventas"), orderBy("ts", "desc")), (s) => { 
    db_local.ventas = s.docs.map(d => d.data()); 
    renderHistorial(); 
  });

  window.handleLogin = async () => {
    const pin = document.getElementById('pin-input').value;
    const pinAdmin = "325606";
    const emp = db_local.staff.find(x => x.p === pin);
    if(!emp && pin !== pinAdmin) return alert("PIN INCORRECTO");
    
    user = (pin === pinAdmin) ? "Admin" : emp.n;
    document.getElementById('view-login').style.display = 'none';
    document.getElementById('navbar').style.display = 'flex';
    
    if(user === "Admin") { 
        document.getElementById('nav-admin-btn').style.display = 'block'; 
        showView('view-admin'); 
    } else { 
        document.getElementById('welcome-msg').innerText = "HOLA, " + user.toUpperCase(); 
        showView('view-ventas'); 
    }
  };

  window.renderProductos = () => {
    document.getElementById('grid-productos').innerHTML = db_local.productos.map(p => `
      <div class="btn-item" onclick="addCart('${p.n}', ${p.p})"><span>🍩</span>${p.n}<br>$${p.p}</div>
    `).join('');
  };

  window.addCart = (n, p) => { cart.push({n, p}); renderCart(); };
  
  // CORRECCIÓN: Función para eliminar un producto específico del carrito
  window.removeFromCart = (index) => {
    cart.splice(index, 1);
    renderCart();
  };

  window.renderCart = () => {
    const cartDiv = document.getElementById('cart-list');
    cartDiv.innerHTML = cart.map((item, i) => `
        <div class="cart-row">
            <span>${item.n} ($${item.p})</span>
            <button class="btn-del" onclick="removeFromCart(${i})">🗑</button>
        </div>
    `).join('');
    
    const t = cart.reduce((a,b)=>a+b.p, 0);
    document.getElementById('total-val').innerText = "$"+t;
    calcVuelto();
  }

  window.calcVuelto = () => {
    const t = cart.reduce((a,b)=>a+b.p, 0);
    const p = document.getElementById('paga-con').value || 0;
    document.getElementById('vuelto-val').innerText = "$" + Math.max(0, p - t);
  };

  window.confirmarVenta = async () => {
    if(!cart.length) return;
    const total = cart.reduce((a,b)=>a+b.p,0);
    await addDoc(collection(db, "ventas"), { 
        t: total, 
        u: user, 
        m: document.getElementById('metodo-pago').value, 
        f: new Date().toLocaleDateString(), 
        h: new Date().toLocaleTimeString(), 
        ts: serverTimestamp() 
    });
    cart = []; 
    document.getElementById('paga-con').value = ""; 
    renderCart(); 
    alert("VENTA CONFIRMADA");
  };

  window.registrarSalida = async () => {
    if(confirm("¿CERRAR TURNO?")){
        const hoy = new Date().toLocaleDateString();
        const ventasTurno = db_local.ventas.filter(v => v.u === user && v.f === hoy);
        const total = ventasTurno.reduce((a, b) => a + b.t, 0);
        const msg = `*CIERRE LA UNICA*%0A*Empleado:* ${user}%0A*Total Turno:* $${total}`;
        window.open(`https://wa.me/${MI_WHATSAPP}?text=${msg}`, '_blank');
        location.reload();
    }
  };

  window.renderHistorial = () => {
    const f = document.getElementById('filtro-h').value;
    const hoy = new Date().toLocaleDateString();
    let lista = (f === 'hoy') ? db_local.ventas.filter(v => v.f === hoy) : db_local.ventas;
    
    document.getElementById('res-dinero').innerText = "$" + lista.reduce((a,b)=>a+b.t,0);
    document.getElementById('res-cant').innerText = lista.length;
    
    document.getElementById('historial-list').innerHTML = `<table><tr><th>HORA</th><th>PAGO</th><th>TOTAL</th></tr>` + 
    lista.slice(0,15).map(v => `<tr><td>${v.h}</td><td>${v.m}</td><td style="font-weight:bold">$${v.t}</td></tr>`).join('') + `</table>`;
  };

  window.showView = (id) => {
    document.querySelectorAll('.container').forEach(c => c.style.display = 'none');
    document.getElementById(id).style.display = 'block';
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    if(id === 'view-ventas') document.getElementById('nav-v').classList.add('active');
  };
</script>
</body>
</html>
