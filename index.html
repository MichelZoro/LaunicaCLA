<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="google" content="notranslate">
    <title>LA ÚNICA - CONTROL ADMIN V12.0</title>
    <style>
        :root { --cactus: #3D4B3F; --gold: #C5A059; --white: #F8F9FA; --danger: #FF6B6B; --success: #51CF66; --glass: rgba(255,255,255,0.08); }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--cactus); color: var(--white); margin: 0; padding-bottom: 90px; }
        .container { padding: 15px; display: none; max-width: 500px; margin: auto; }
        .glass-card { background: var(--glass); backdrop-filter: blur(15px); border-radius: 20px; padding: 20px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 15px; }
        .btn-gold { background: linear-gradient(135deg, #D4AF37, #B8860B); color: #1a1a1a; border: none; padding: 15px; border-radius: 12px; font-weight: 800; width: 100%; cursor: pointer; text-transform: uppercase; }
        .input-dark { width: 100%; background: rgba(0,0,0,0.4); border: 1px solid var(--gold); padding: 14px; border-radius: 12px; color: white; margin: 10px 0; text-align: center; font-size: 1.1rem; }
        .tab-bar { display: flex; gap: 8px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2); background: none; color: white; font-size: 0.65rem; font-weight: 700; }
        .tab-btn.active { background: var(--gold); color: #000; }
        .grid-pos { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn-item { background: var(--glass); border: 1px solid rgba(255,255,255,0.15); border-radius: 18px; padding: 20px 10px; text-align: center; }
        nav { position: fixed; bottom: 0; width: 100%; background: #0a0a0a; display: none; justify-content: space-around; padding: 12px 0; border-top: 1px solid var(--gold); z-index: 1000; }
        .nav-item { text-align: center; font-size: 0.65rem; color: #888; font-weight: 800; }
        .nav-item.active { color: var(--gold); }
        table { width: 100%; border-collapse: collapse; font-size: 0.65rem; }
        th { color: var(--gold); text-align: left; padding: 5px; border-bottom: 1px solid var(--glass); }
        td { padding: 8px 5px; border-bottom: 1px solid var(--glass); }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: rgba(255,255,255,0.05); border-radius: 12px; margin-bottom: 8px; border-left: 3px solid var(--gold); }
        .btn-del { background: rgba(255, 107, 107, 0.2); color: var(--danger); border: none; padding: 8px 12px; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div id="view-login" style="display: flex; flex-direction: column; align-items: center; padding-top: 100px;">
    <div class="glass-card" style="width: 85%; text-align: center;">
        <h1 style="color:var(--gold); margin:0;">LA ÚNICA</h1>
        <input type="password" id="pin-input" class="input-dark" placeholder="PIN" inputmode="numeric">
        <button onclick="handleLogin()" class="btn-gold">ENTRAR</button>
    </div>
</div>

<div id="view-ventas" class="container">
    <h2 id="welcome-msg" style="color:var(--gold); text-align: center;"></h2>
    <div id="grid-productos" class="grid-pos"></div>
    <div class="glass-card" style="margin-top:20px;">
        <div id="cart-list"></div>
        <h3 style="text-align:right;">Total: <span id="total-val" style="color:var(--gold); font-size: 1.8rem;">$0</span></h3>
        <button onclick="confirmarVenta()" class="btn-gold">✓ CONFIRMAR VENTA</button>
        <button id="btn-cerrar-turno" onclick="registrarSalida()" class="btn-gold" style="background:none; border: 1px solid var(--danger); color:var(--danger); margin-top:20px; font-size: 0.7rem;">CERRAR TURNO</button>
    </div>
</div>

<div id="view-admin" class="container">
    <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab('v', this)">REPORTES</button>
        <button class="tab-btn" onclick="switchTab('s', this)">STAFF</button>
        <button class="tab-btn" onclick="switchTab('p', this)">MENÚ</button>
    </div>
    
    <div id="tab-v" class="admin-tab">
        <div class="glass-card" style="text-align: center;"><input type="date" id="calendar-filter" class="input-dark" onchange="renderHistorial()"></div>
        <div id="report-results" class="glass-card" style="display:none;"><div id="historial-list"></div></div>
    </div>
    
    <div id="tab-s" class="admin-tab" style="display:none">
        <div class="glass-card"><input type="date" id="calendar-staff" class="input-dark" onchange="renderAdminLists()"></div>
        <div id="staff-results" style="display:none;"><div class="glass-card"><h4>FICHAJES DEL DÍA</h4><div id="fichaje-list"></div></div></div>
        <div class="glass-card"><h4>GESTIÓN STAFF</h4><div id="staff-list"></div><button class="btn-gold" onclick="nuevoEmp()">+ AGREGAR EMPLEADO</button></div>
    </div>

    <div id="tab-p" class="admin-tab" style="display:none">
        <div class="glass-card"><h4>MENÚ</h4><div id="prod-admin-list"></div><button class="btn-gold" onclick="nuevoProd()">+ AGREGAR AL MENÚ</button></div>
    </div>
</div>

<nav id="navbar">
    <div class="nav-item" id="nav-v" onclick="showView('view-ventas')">💰 VENTAS</div>
    <div id="nav-admin-btn" class="nav-item" style="display:none" onclick="showView('view-admin')">⚙️ ADMIN</div>
    <div class="nav-item" onclick="location.reload()" style="color:var(--danger)">🚪 SALIR</div>
</nav>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
  import { initializeFirestore, persistentLocalCache, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, deleteDoc, doc, getDocs } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

  const firebaseConfig = { apiKey: "AIzaSyCQEzm6s__cJx2G6_UzBuxh4mmKrhNvAc0", projectId: "churrerialaunica-a2888", appId: "1:721969833627:web:8c0db201407a05f82c483e" };
  const app = initializeApp(firebaseConfig);
  const db = initializeFirestore(app, { localCache: persistentLocalCache() });

  let user = ""; let cart = []; let db_local = { productos: [], ventas: [], staff: [], fichajes: [] };

  onSnapshot(collection(db, "productos"), (s) => { db_local.productos = s.docs.map(d => ({id: d.id, ...d.data()})); renderProductos(); renderAdminLists(); });
  onSnapshot(collection(db, "staff"), (s) => { db_local.staff = s.docs.map(d => ({id: d.id, ...d.data()})); renderAdminLists(); });
  onSnapshot(query(collection(db, "ventas"), orderBy("ts", "desc")), (s) => { db_local.ventas = s.docs.map(d => d.data()); renderHistorial(); });
  onSnapshot(query(collection(db, "fichajes"), orderBy("ts", "asc")), (s) => { db_local.fichajes = s.docs.map(d => ({id: d.id, ...d.data()})); renderAdminLists(); });

  window.handleLogin = async () => {
    const pin = document.getElementById('pin-input').value;
    const pinAdmin = "325606";
    const emp = db_local.staff.find(x => x.p === pin);
    
    if(!emp && pin !== pinAdmin) return alert("PIN INCORRECTO");
    
    user = (pin === pinAdmin) ? "Admin" : emp.n;
    document.getElementById('view-login').style.display = 'none';
    document.getElementById('navbar').style.display = 'flex';
    
    if(user === "Admin") {
        document.getElementById('nav-admin-btn').style.display = 'block';
        document.getElementById('nav-v').style.display = 'none'; // Admin NO vende
        showView('view-admin');
    } else {
        showView('view-ventas');
        document.getElementById('nav-admin-btn').style.display = 'none';
        document.getElementById('welcome-msg').innerText = "HOLA, " + user.toUpperCase();
        await autoFichar();
    }
  };

  async function autoFichar() {
    const hoy = new Date().toLocaleDateString('es-ES');
    const horaAct = new Date().getHours();
    const fichajesHoy = db_local.fichajes.filter(f => f.u === user && f.f === hoy);
    
    let tipo = "";
    if (horaAct < 14 && !fichajesHoy.some(f => f.tipo === "E_MAÑANA")) tipo = "E_MAÑANA";
    else if (horaAct >= 14 && !fichajesHoy.some(f => f.tipo === "E_TARDE")) tipo = "E_TARDE";

    if (tipo) {
        await addDoc(collection(db, "fichajes"), { u: user, f: hoy, h: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}), tipo: tipo, ts: serverTimestamp() });
    }
  }

  window.registrarSalida = async () => {
    const ahora = new Date();
    const hoy = ahora.toLocaleDateString('es-ES');
    const horaNum = ahora.getHours() * 100 + ahora.getMinutes();
    const fichajesHoy = db_local.fichajes.filter(f => f.u === user && f.f === hoy);

    let tipoSalida = "";
    if (ahora.getHours() < 14) {
        if (horaNum < 1125) return alert("No podés cerrar antes de las 11:25");
        if (fichajesHoy.some(f => f.tipo === "S_MAÑANA")) return alert("Ya cerraste el turno mañana");
        tipoSalida = "S_MAÑANA";
    } else {
        if (horaNum < 1955) return alert("No podés cerrar antes de las 19:55");
        if (fichajesHoy.some(f => f.tipo === "S_TARDE")) return alert("Ya cerraste el turno tarde");
        tipoSalida = "S_TARDE";
    }

    if(confirm(`¿CERRAR TURNO ${tipoSalida.split('_')[1]}?`)){ 
        await addDoc(collection(db, "fichajes"), { u: user, f: hoy, h: ahora.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}), tipo: tipoSalida, ts: serverTimestamp() }); 
        location.reload(); 
    }
  };

  window.renderAdminLists = () => {
    document.getElementById('staff-list').innerHTML = db_local.staff.map(s => `<div class="list-item"><span>${s.n} (PIN: ${s.p})</span><button class="btn-del" onclick="delDoc('staff','${s.id}')">🗑</button></div>`).join('');
    document.getElementById('prod-admin-list').innerHTML = db_local.productos.map(p => `<div class="list-item"><span>${p.n} ($${p.p})</span><button class="btn-del" onclick="delDoc('productos','${p.id}')">🗑</button></div>`).join('');
    
    const dS = document.getElementById('calendar-staff').value; if(!dS) return;
    document.getElementById('staff-results').style.display = 'block';
    const sS = new Date(dS + "T00:00:00").toLocaleDateString('es-ES');
    
    const res = {};
    db_local.fichajes.filter(f => f.f === sS).forEach(f => {
        if(!res[f.u]) res[f.u] = {em:'-', sm:'-', et:'-', st:'-', hm:0, ht:0};
        if(f.tipo==="E_MAÑANA") res[f.u].em=f.h;
        if(f.tipo==="S_MAÑANA") { res[f.u].sm=f.h; res[f.u].hm = calcularHoras(res[f.u].em, f.h); }
        if(f.tipo==="E_TARDE") res[f.u].et=f.h;
        if(f.tipo==="S_TARDE") { res[f.u].st=f.h; res[f.u].ht = calcularHoras(res[f.u].et, f.h); }
    });

    let h = `<table><tr><th>EMP</th><th>MAÑANA</th><th>TARDE</th><th>TOTAL</th></tr>`;
    for(let e in res) {
        const total = (res[e].hm + res[e].ht).toFixed(1);
        h += `<tr><td>${e}</td><td>${res[e].em}/${res[e].sm}</td><td>${res[e].et}/${res[e].st}</td><td style="font-weight:bold; color:var(--gold)">${total}h</td></tr>`;
    }
    document.getElementById('fichaje-list').innerHTML = h + `</table>`;
  };

  function calcularHoras(e, s) {
    if(e==='-' || s==='-') return 0;
    const [hE,mE]=e.split(':'); const [hS,mS]=s.split(':');
    return ((parseInt(hS)*60+parseInt(mS)) - (parseInt(hE)*60+parseInt(mE)))/60;
  }

  // Resto de funciones (Ventas, Historial, etc) se mantienen igual pero ocultas para el Admin
  window.renderProductos = () => { document.getElementById('grid-productos').innerHTML = db_local.productos.map(p => `<div class="btn-item" onclick="addCart('${p.n}', ${p.p})">${p.n}<br>$${p.p}</div>`).join(''); };
  window.addCart = (n, p) => { cart.push({n, p}); renderCart(); };
  window.renderCart = () => {
    document.getElementById('cart-list').innerHTML = cart.map((item, i) => `<div style="display:flex; justify-content:space-between;"><span>${item.n}</span><span>$${item.p}</span></div>`).join('');
    document.getElementById('total-val').innerText = "$" + cart.reduce((a,b)=>a+b.p, 0);
  }
  window.confirmarVenta = async () => {
    if(!cart.length) return;
    await addDoc(collection(db, "ventas"), { t: cart.reduce((a,b)=>a+b.p,0), u: user, f: new Date().toLocaleDateString('es-ES'), ts: serverTimestamp() });
    cart = []; renderCart(); alert("VENTA EXITOSA");
  };
  window.renderHistorial = () => {
    const dV = document.getElementById('calendar-filter').value; if(!dV) return;
    const sS = new Date(dV + "T00:00:00").toLocaleDateString('es-ES');
    const vD = db_local.ventas.filter(v => v.f === sS);
    document.getElementById('report-results').style.display = 'block';
    document.getElementById('historial-list').innerHTML = `<h3>Total Día: $${vD.reduce((a,b)=>a+b.t,0)}</h3>` + vD.map(v => `<div class="list-item"><span>${v.u}</span><span>$${v.t}</span></div>`).join('');
  };
  window.switchTab = (t, b) => { document.querySelectorAll('.admin-tab').forEach(x => x.style.display = 'none'); document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active')); document.getElementById('tab-'+t).style.display = 'block'; b.classList.add('active'); };
  window.delDoc = async (c, i) => { if(confirm("¿Eliminar?")) await deleteDoc(doc(db, c, i)); };
  window.nuevoEmp = async () => { const n = prompt("Nombre:"); const p = prompt("PIN:"); if(n && p) await addDoc(collection(db, "staff"), { n, p }); };
  window.nuevoProd = async () => { const n = prompt("Producto:"); const p = parseInt(prompt("Precio:")); if(n && p) await addDoc(collection(db, "productos"), { n, p }); };
  window.showView = (id) => { 
    document.querySelectorAll('.container').forEach(c => c.style.display = 'none'); 
    document.getElementById(id).style.display = 'block';
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    if(id==='view-admin') document.getElementById('nav-admin-btn').classList.add('active');
    else document.getElementById('nav-v').classList.add('active');
  };
</script>
</body>
</html>
