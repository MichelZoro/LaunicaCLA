<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>La Unica - Sistema de Ventas</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --cactus: #3D4B3F; --gold: #C5A059; --white: #F8F9FA; --danger: #FF6B6B; --success: #51CF66; }
        body { background: var(--cactus); color: var(--white); font-family: sans-serif; margin: 0; padding-bottom: 80px; }
        .container { padding: 15px; max-width: 500px; margin: auto; display: none; }
        .glass-card { background: rgba(255,255,255,0.1); border-radius: 15px; padding: 15px; margin-bottom: 10px; border: 1px solid var(--gold); }
        .btn-gold { background: var(--gold); color: black; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; }
        nav { position: fixed; bottom: 0; width: 100%; background: #111; display: flex; justify-content: space-around; padding: 10px 0; border-top: 2px solid var(--gold); z-index: 100; }
        .nav-item { text-align: center; font-size: 0.7rem; color: #888; flex: 1; cursor: pointer; }
        .nav-item.active { color: var(--gold); }
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        th, td { padding: 8px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

<div id="view-login" class="container" style="display: block; text-align: center; padding-top: 50px;">
    <div class="glass-card">
        <h2>INGRESO</h2>
        <input type="password" id="pin-input" placeholder="PIN" style="width:100%; padding:15px; margin:10px 0; font-size:1.5rem; text-align:center;">
        <button class="btn-gold" onclick="handleLogin()">ENTRAR / FICHAR</button>
    </div>
</div>

<div id="view-ventas" class="container">
    <div id="grid-productos" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;"></div>
    <div class="glass-card" style="margin-top:20px;">
        <h3>Total: <span id="total-venta">$0</span></h3>
        <button class="btn-gold" onclick="confirmarVenta()">CONFIRMAR VENTA</button>
    </div>
</div>

<div id="view-admin" class="container">
    <div class="glass-card">
        <h3>Reporte de Ventas</h3>
        <select id="filtro-tiempo" onchange="renderReporte()" style="width:100%; padding:10px; margin-bottom:10px;">
            <option value="hoy">Hoy (por Turnos)</option>
            <option value="semana">Esta Semana</option>
            <option value="mes">Este Mes</option>
        </select>
        <div id="reporte-content"></div>
    </div>
</div>

<nav id="navbar" style="display:none;">
    <div class="nav-item active" onclick="showView('view-ventas')">💰 Ventas</div>
    <div class="nav-item" onclick="showView('view-admin'); renderReporte();">📊 Reportes</div>
    <div class="nav-item" onclick="marcarSalida()" style="color:var(--danger)">🚪 Salida</div>
</nav>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { initializeFirestore, persistentLocalCache, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCQEzm6s__cJx2G6_UzBuxh4mmKrhNvAc0",
        projectId: "churrerialaunica-a2888",
        appId: "1:721969833627:web:8c0db201407a05f82c483e"
    };

    const app = initializeApp(firebaseConfig);
    const db = initializeFirestore(app, { localCache: persistentLocalCache() });

    let user = ""; let turno = ""; let cart = []; let ventasLocal = [];
    let productos = [ {n: "Churros x12", p: 5000}, {n: "Churros x6", p: 2600}, {n: "Rellenos x1", p: 600} ];

    window.handleLogin = async () => {
        const pin = document.getElementById('pin-input').value;
        if(pin === "1234") user = "Empleado 1"; else if(pin === "0000") user = "Admin"; else return alert("PIN Incorrecto");
        
        const hora = new Date().getHours();
        turno = (hora < 14) ? "Mañana" : "Tarde";
        
        document.getElementById('view-login').style.display = 'none';
        document.getElementById('navbar').style.display = 'flex';
        showView('view-ventas');
        renderProductos();
    };

    window.renderProductos = () => {
        document.getElementById('grid-productos').innerHTML = productos.map(p => `
            <div class="glass-card" onclick="addToCart(${p.p})">${p.n}<br><b>$${p.p}</b></div>
        `).join('');
    };

    window.addToCart = (p) => { cart.push(p); document.getElementById('total-val'); actualizarTotal(); };
    function actualizarTotal() { document.getElementById('total-venta').innerText = "$" + cart.reduce((a,b)=>a+b,0); }

    window.confirmarVenta = async () => {
        if(!cart.length) return;
        const v = { t: cart.reduce((a,b)=>a+b,0), u: user, tr: turno, f: new Date().toLocaleDateString(), ts: serverTimestamp() };
        try { await addDoc(collection(db, "ventas"), v); alert("Venta Guardada"); } 
        catch(e) { alert("Guardado en Memoria (Offline)"); }
        cart = []; actualizarTotal();
    };

    onSnapshot(query(collection(db, "ventas"), orderBy("ts", "desc")), (s) => {
        ventasLocal = s.docs.map(d => d.data());
    });

    window.renderReporte = () => {
        const filtro = document.getElementById('filtro-tiempo').value;
        const hoy = new Date().toLocaleDateString();
        let filtradas = ventasLocal;

        if(filtro === "hoy") filtradas = ventasLocal.filter(v => v.f === hoy);
        
        const total = filtradas.reduce((a,b)=>a+b.t, 0);
        const mañana = filtradas.filter(v => v.tr === "Mañana").reduce((a,b)=>a+b.t, 0);
        const tarde = filtradas.filter(v => v.tr === "Tarde").reduce((a,b)=>a+b.t, 0);

        document.getElementById('reporte-content').innerHTML = `
            <p>🌅 Turno Mañana: <b>$${mañana}</b></p>
            <p>🌇 Turno Tarde: <b>$${tarde}</b></p>
            <hr>
            <h4>TOTAL PERIODO: $${total}</h4>
        `;
    };

    window.showView = (id) => {
        document.querySelectorAll('.container').forEach(c => c.style.display = 'none');
        document.getElementById(id).style.display = 'block';
    };

    window.marcarSalida = () => { location.reload(); };

    // REGISTRO DEL SERVICE WORKER PARA OFFLINE
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').then(() => console.log("Escudo Offline Activado"));
    }
</script>
</body>
</html>
