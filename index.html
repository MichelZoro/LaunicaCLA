<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SISTEMA GESTIÓN LA ÚNICA V6</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --cactus: #3D4B3F; --gold: #C5A059; --white: #F8F9FA; --danger: #FF6B6B; --success: #51CF66; }
        * { box-sizing: border-box; font-family: 'Montserrat', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--cactus); color: var(--white); margin: 0; padding-bottom: 90px; }
        .container { padding: 15px; display: none; max-width: 500px; margin: auto; }
        .glass-card { background: rgba(255,255,255,0.08); backdrop-filter: blur(10px); border-radius: 20px; padding: 20px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 15px; }
        .btn-gold { background: linear-gradient(135deg, #D4AF37, #B8860B); color: black; border: none; padding: 15px; border-radius: 12px; font-weight: 700; width: 100%; cursor: pointer; }
        .input-dark { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--gold); padding: 12px; border-radius: 10px; color: white; margin: 10px 0; text-align: center; font-size: 1.1rem; }
        
        /* Botones Grandes para Empleado */
        .grid-pos { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn-item { background: rgba(255,255,255,0.1); border: 1px solid var(--gold); border-radius: 15px; padding: 25px 10px; text-align: center; font-weight: bold; cursor: pointer; }
        .btn-item span { display: block; font-size: 2.5rem; margin-bottom: 5px; }

        /* Tabs Admin */
        .tab-bar { display: flex; gap: 5px; margin-bottom: 15px; overflow-x: auto; }
        .tab-btn { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid var(--gold); background: none; color: white; font-size: 0.75rem; min-width: 90px; font-weight: bold; }
        .tab-btn.active { background: var(--gold); color: black; }

        /* Carrito */
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        
        nav { position: fixed; bottom: 0; width: 100%; background: #111; display: none; justify-content: space-around; padding: 15px 0; border-top: 1px solid var(--gold); z-index: 100; }
        .nav-item { text-align: center; font-size: 0.7rem; color: #777; font-weight: bold; cursor: pointer; }
        .nav-item.active { color: var(--gold); }

        table { width: 100%; border-collapse: collapse; font-size: 0.75rem; margin-top: 10px; background: rgba(0,0,0,0.2); border-radius: 10px; }
        th, td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); text-align: left; }
    </style>
</head>
<body>

<div id="view-login" style="display: flex; flex-direction: column; align-items: center; padding-top: 80px;">
    <div class="glass-card" style="width: 320px; text-align: center;">
        <h2 style="color:var(--gold); letter-spacing: 2px;">LA ÚNICA</h2>
        <input type="password" id="pin-input" class="input-dark" placeholder="INGRESE PIN">
        <button onclick="handleLogin()" class="btn-gold">ENTRAR</button>
    </div>
</div>

<div id="view-ventas" class="container">
    <h2 id="welcome-msg" style="color:var(--gold); font-size: 1.2rem; text-align: center; margin-bottom: 20px;"></h2>
    
    <div id="grid-productos" class="grid-pos"></div>
    
    <div class="glass-card" style="margin-top:20px; border-top: 4px solid var(--gold);">
        <h4 style="margin-top:0">Carrito de Venta</h4>
        <div id="cart-list"></div>
        <h3 style="text-align:right; font-size: 1.8rem; margin: 15px 0;">Total: <span id="total-val" style="color:var(--gold)">$0</span></h3>
        
        <label style="font-size: 0.8rem; opacity: 0.8;">Método de Pago:</label>
        <select id="metodo-pago" class="input-dark">
            <option value="Efectivo">💵 Efectivo</option>
            <option value="Transferencia">📱 Transferencia</option>
        </select>
        
        <input type="number" id="paga-con" class="input-dark" placeholder="Monto Recibido $" oninput="calcVuelto()">
        <p style="font-weight: bold; font-size: 1.2rem;">Vuelto a entregar: <span id="vuelto-val" style="color:var(--success)">$0</span></p>
        
        <button onclick="confirmarVenta()" class="btn-gold" style="font-size: 1.2rem; padding: 20px;">CONFIRMAR VENTA</button>
        
        <button onclick="registrarSalida()" class="btn-gold" style="background:var(--danger); margin-top:30px; color:white; padding: 10px;">CERRAR TURNO Y SALIR</button>
    </div>
</div>

<div id="view-admin" class="container">
    <div class="tab-bar">
        <button class="tab-btn active" id="t-v" onclick="switchTab('v')">VENTAS</button>
        <button class="tab-btn" id="t-s" onclick="switchTab('s')">STAFF</button>
        <button class="tab-btn" id="t-p" onclick="switchTab('p')">PRODUCTOS</button>
    </div>

    <div id="tab-v" class="admin-tab">
        <div class="glass-card">
            <select id="filtro-h" class="input-dark" onchange="renderHistorial()">
                <option value="hoy">Ventas de Hoy</option>
                <option value="semana">Últimos 7 Días</option>
                <option value="mes">Resumen del Mes</option>
            </select>
            <div id="historial-resumen" style="text-align: center; margin-bottom: 10px;"></div>
            <div id="historial-list" style="overflow-x:auto"></div>
        </div>
    </div>

    <div id="tab-s" class="admin-tab" style="display:none">
        <div class="glass-card">
            <h4>Lista de Personal</h4>
            <div id="staff-list"></div>
            <button class="btn-gold" onclick="nuevoEmp()" style="margin-top: 10px;">+ AGREGAR EMPLEADO</button>
        </div>
        <div class="glass-card">
            <h4>Reloj de Fichajes (Entradas/Salidas)</h4>
            <div id="fichaje-list"></div>
        </div>
    </div>

    <div id="tab-p" class="admin-tab" style="display:none">
        <div class="glass-card">
            <h4>Gestionar Menú</h4>
            <div id="prod-admin-list"></div>
            <button class="btn-gold" onclick="nuevoProd()" style="margin-top: 10px;">+ AGREGAR PRODUCTO</button>
        </div>
    </div>
</div>

<nav id="navbar">
    <div class="nav-item active" id="nav-v" onclick="showView('view-ventas')">💰 VENTAS</div>
    <div id="nav-admin-btn" class="nav-item" style="display:none" onclick="showView('view-admin'); renderAdminAll();">⚙️ ADMIN</div>
    <div class="nav-item" onclick="location.reload()" style="color:var(--danger)">🚪 SALIR</div>
</nav>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
  import { initializeFirestore, persistentLocalCache, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

  const firebaseConfig = { apiKey: "AIzaSyCQEzm6s__cJx2G6_UzBuxh4mmKrhNvAc0", projectId: "churrerialaunica-a2888", appId: "1:721969833627:web:8c0db201407a05f82c483e" };
  const app = initializeApp(firebaseConfig);
  const db = initializeFirestore(app, { localCache: persistentLocalCache() });

  let user = ""; let cart = [];
  let db_local = { productos: [], ventas: [], staff: [], fichajes: [] };

  // Escucha de Firebase
  onSnapshot(collection(db, "productos"), (s) => { db_local.productos = s.docs.map(d => ({id: d.id, ...d.data()})); renderProductos(); });
  onSnapshot(collection(db, "staff"), (s) => { db_local.staff = s.docs.map(d => ({id: d.id, ...d.data()})); });
  onSnapshot(query(collection(db, "ventas"), orderBy("ts", "desc")), (s) => { db_local.ventas = s.docs.map(d => d.data()); if(user === "Admin") renderHistorial(); });
  onSnapshot(query(collection(db, "fichajes"), orderBy("ts", "desc")), (s) => { db_local.fichajes = s.docs.map(d => d.data()); });

  // LOGIN CON FUERZA BRUTA PARA ADMIN
  window.handleLogin = async () => {
    const pin = document.getElementById('pin-input').value;
    const emp = db_local.staff.find(x => x.p === pin);
    
    if(!emp && pin !== "0000") return alert("PIN Incorrecto");
    
    user = emp ? emp.n : "Admin";
    document.getElementById('welcome-msg').innerText = "Hola, " + user + " 👋";
    
    // Fichaje de Entrada
    await addDoc(collection(db, "fichajes"), { u: user, f: new Date().toLocaleDateString(), h: new Date().toLocaleTimeString(), tipo: "ENTRADA", ts: serverTimestamp() });

    document.getElementById('view-login').style.display = 'none';
    document.getElementById('navbar').style.display = 'flex';
    showView('view-ventas');

    if(pin === "0000") {
        document.getElementById('nav-admin-btn').style.display = 'block';
    }
  };

  // --- MÓDULO EMPLEADO ---
  window.renderProductos = () => {
    document.getElementById('grid-productos').innerHTML = db_local.productos.map(p => `
      <div class="btn-item" onclick="addCart('${p.n}', ${p.p})"><span>🍩</span>${p.n}<br>$${p.p}</div>
    `).join('');
  };

  window.addCart = (n, p) => { cart.push({n, p}); renderCart(); };
  window.delCart = (i) => { cart.splice(i, 1); renderCart(); };
  
  function renderCart() {
    const list = document.getElementById('cart-list');
    list.innerHTML = cart.map((item, i) => `
        <div class="cart-item"><span>${item.n}</span> <span>$${item.p} <button onclick="delCart(${i})" style="color:var(--danger); background:none; border:none; font-weight:bold; padding:5px 10px;">[X]</button></span></div>
    `).join('');
    const total = cart.reduce((a,b)=>a+b.p, 0);
    document.getElementById('total-val').innerText = "$"+total;
    calcVuelto();
  }

  window.calcVuelto = () => {
    const t = cart.reduce((a,b)=>a+b.p, 0);
    const p = document.getElementById('paga-con').value || 0;
    document.getElementById('vuelto-val').innerText = "$" + (p > 0 ? Math.max(0, p - t) : 0);
  };

  window.confirmarVenta = async () => {
    if(!cart.length) return;
    const metodo = document.getElementById('metodo-pago').value;
    const tTotal = cart.reduce((a,b)=>a+b.p,0);
    const v = { 
        t: tTotal, u: user, m: metodo, 
        f: new Date().toLocaleDateString(), 
        h: new Date().toLocaleTimeString(), 
        ts: serverTimestamp(), 
        tr: (new Date().getHours() < 14 ? "Mañana" : "Tarde") 
    };
    await addDoc(collection(db, "ventas"), v);
    alert("Venta Registrada!");
    cart = []; document.getElementById('paga-con').value = ""; renderCart();
  };

  window.registrarSalida = async () => {
    if(confirm("¿Cerrar turno y salir?")) {
        await addDoc(collection(db, "fichajes"), { u: user, f: new Date().toLocaleDateString(), h: new Date().toLocaleTimeString(), tipo: "SALIDA", ts: serverTimestamp() });
        location.reload();
    }
  };

  // --- MÓDULO ADMINISTRADOR ---
  window.switchTab = (t) => {
    document.querySelectorAll('.admin-tab').forEach(x => x.style.display = 'none');
    document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
    document.getElementById('tab-'+t).style.display = 'block';
    document.getElementById('t-'+t).classList.add('active');
  };

  window.renderAdminAll = () => {
    renderHistorial();
    // Lista Staff
    document.getElementById('staff-list').innerHTML = db_local.staff.map(s => `
        <div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid rgba(255,255,255,0.1)">
            <span>${s.n} (PIN: ${s.p})</span>
            <div>
                <button onclick="editEmp('${s.id}')" style="color:var(--gold); background:none; border:none; font-size:0.7rem;">EDITAR</button>
                <button onclick="delEmp('${s.id}')" style="color:red; background:none; border:none; margin-left:10px; font-size:0.7rem;">BORRAR</button>
            </div>
        </div>`).join('');
    // Historial Fichajes
    document.getElementById('fichaje-list').innerHTML = `<table><tr><th>Empleado</th><th>Fecha</th><th>Hora</th><th>Tipo</th></tr>` + 
      db_local.fichajes.slice(0,20).map(f => `<tr><td>${f.u}</td><td>${f.f}</td><td>${f.h}</td><td>${f.tipo}</td></tr>`).join('') + `</table>`;
    // Lista Productos
    document.getElementById('prod-admin-list').innerHTML = db_local.productos.map(p => `
        <div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid rgba(255,255,255,0.1)">
            <span>🍩 ${p.n} - $${p.p}</span>
            <div>
                <button onclick="editProd('${p.id}')" style="color:var(--gold); background:none; border:none; font-size:0.7rem;">EDITAR</button>
                <button onclick="delProd('${p.id}')" style="color:red; background:none; border:none; margin-left:10px; font-size:0.7rem;">BORRAR</button>
            </div>
        </div>`).join('');
  };

  window.renderHistorial = () => {
    const f = document.getElementById('filtro-h').value;
    const hoy = new Date().toLocaleDateString();
    let lista = db_local.ventas;
    if(f === 'hoy') lista = db_local.ventas.filter(v => v.f === hoy);
    
    const total = lista.reduce((a,b)=>a+b.t, 0);
    document.getElementById('historial-resumen').innerHTML = `<h2 style="color:var(--gold); margin:0;">TOTAL: $${total}</h2>`;
    
    document.getElementById('historial-list').innerHTML = `<table><tr><th>Fecha/Hora</th><th>Turno</th><th>Pago</th><th>Total</th></tr>` + 
      lista.map(v => `<tr><td>${v.f} ${v.h}</td><td>${v.tr}</td><td>${v.m}</td><td>$${v.t}</td></tr>`).join('') + `</table>`;
  };

  // CRUD ADMIN
  window.nuevoEmp = async () => { const n = prompt("Nombre:"); const p = prompt("PIN:"); if(n && p) await addDoc(collection(db, "staff"), { n, p }); };
  window.delEmp = async (id) => { if(confirm("¿Eliminar empleado?")) await deleteDoc(doc(db, "staff", id)); };
  window.editEmp = async (id) => { const n = prompt("Nuevo Nombre:"); const p = prompt("Nuevo PIN:"); if(n && p) await updateDoc(doc(db, "staff", id), { n, p }); };

  window.nuevoProd = async () => { const n = prompt("Nombre Producto:"); const p = parseInt(prompt("Precio:")); if(n && p) await addDoc(collection(db, "productos"), { n, p }); };
  window.delProd = async (id) => { if(confirm("¿Eliminar producto?")) await deleteDoc(doc(db, "productos", id)); };
  window.editProd = async (id) => { const n = prompt("Nuevo Nombre:"); const p = parseInt(prompt("Nuevo Precio:")); if(n && p) await updateDoc(doc(db, "productos", id), { n, p }); };

  window.showView = (id) => {
    document.querySelectorAll('.container').forEach(c => c.style.display = 'none');
    document.getElementById(id).style.display = 'block';
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    if(id === 'view-ventas') document.getElementById('nav-v').classList.add('active');
    if(id === 'view-admin') document.getElementById('nav-admin-btn').classList.add('active');
  };
</script>
</body>
</html>
