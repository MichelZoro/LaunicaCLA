<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="google" content="notranslate">
    <title>LA ÚNICA - CONTROL V9</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --cactus: #3D4B3F; --gold: #C5A059; --white: #F8F9FA; --danger: #FF6B6B; --success: #51CF66; --glass: rgba(255,255,255,0.08); }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--cactus); color: var(--white); margin: 0; padding-bottom: 90px; }
        .container { padding: 15px; display: none; max-width: 500px; margin: auto; }
        .glass-card { background: var(--glass); backdrop-filter: blur(15px); border-radius: 20px; padding: 20px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 15px; }
        .btn-gold { background: linear-gradient(135deg, #D4AF37, #B8860B); color: #1a1a1a; border: none; padding: 15px; border-radius: 12px; font-weight: 800; width: 100%; cursor: pointer; text-transform: uppercase; }
        .input-dark { width: 100%; background: rgba(0,0,0,0.4); border: 1px solid var(--gold); padding: 14px; border-radius: 12px; color: white; margin: 10px 0; text-align: center; font-size: 1.1rem; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: rgba(255,255,255,0.05); border-radius: 12px; margin-bottom: 8px; border-left: 3px solid var(--gold); }
        .btn-del { background: rgba(255, 107, 107, 0.2); color: var(--danger); border: none; padding: 8px 12px; border-radius: 10px; cursor: pointer; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; }
        .tab-bar { display: flex; gap: 8px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2); background: none; color: white; font-size: 0.7rem; font-weight: 700; }
        .tab-btn.active { background: var(--gold); color: #000; }
        .grid-pos { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn-item { background: var(--glass); border: 1px solid rgba(255,255,255,0.15); border-radius: 18px; padding: 20px 10px; text-align: center; }
        nav { position: fixed; bottom: 0; width: 100%; background: #0a0a0a; display: none; justify-content: space-around; padding: 12px 0; border-top: 1px solid var(--gold); z-index: 1000; }
        .nav-item { text-align: center; font-size: 0.65rem; color: #888; font-weight: 800; }
        .nav-item.active { color: var(--gold); }
        table { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
        th { color: var(--gold); text-align: left; padding: 10px; border-bottom: 1px solid var(--glass); }
        td { padding: 10px; border-bottom: 1px solid var(--glass); }
        .cart-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

<div id="view-login" style="display: flex; flex-direction: column; align-items: center; padding-top: 100px;">
    <div class="glass-card" style="width: 85%; text-align: center;">
        <h1 style="color:var(--gold); margin:0;">LA ÚNICA</h1>
        <input type="password" id="pin-input" class="input-dark" placeholder="PIN" inputmode="numeric">
        <button onclick="handleLogin()" class="btn-gold">ENTRAR</button>
    </div>
</div>

<div id="view-ventas" class="container">
    <h2 id="welcome-msg" style="color:var(--gold); text-align: center; font-size: 1.1rem;"></h2>
    <div id="grid-productos" class="grid-pos"></div>
    <div class="glass-card" style="margin-top:20px;">
        <div id="cart-list"></div>
        <h3 style="text-align:right; margin: 15px 0;">Total: <span id="total-val" style="color:var(--gold); font-size: 1.8rem;">$0</span></h3>
        <select id="metodo-pago" class="input-dark"><option value="Efectivo">💵 EFECTIVO</option><option value="Transferencia">📱 TRANSFERENCIA</option></select>
        <input type="number" id="paga-con" class="input-dark" placeholder="RECIBIDO $" oninput="calcVuelto()">
        <p style="text-align:center; font-size: 0.9rem; opacity: 0.8;">Vuelto: <span id="vuelto-val" style="color:var(--success); font-weight:bold; font-size:1.4rem;">$0</span></p>
        <button onclick="confirmarVenta()" class="btn-gold" style="padding:18px;">✓ CONFIRMAR VENTA</button>
        <button onclick="registrarSalida()" class="btn-gold" style="background:none; border: 1px solid var(--danger); color:var(--danger); margin-top:20px; font-size: 0.7rem; padding: 10px;">CERRAR TURNO</button>
    </div>
</div>

<div id="view-admin" class="container">
    <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab('v', this)">REPORTES</button>
        <button class="tab-btn" onclick="switchTab('s', this)">STAFF</button>
        <button class="tab-btn" onclick="switchTab('p', this)">MENÚ</button>
    </div>
    <div id="tab-v" class="admin-tab">
        <div class="glass-card">
            <select id="filtro-h" class="input-dark" onchange="renderHistorial()"><option value="hoy">HOY</option><option value="semana">SEMANA</option><option value="mes">MES</option></select>
            <div id="historial-resumen" style="text-align:center"></div>
            <div id="historial-list"></div>
            <button onclick="reiniciarSistema()" class="btn-gold" style="background:var(--danger); color:white; margin-top:30px; font-size:0.6rem; opacity: 0.7;">⚠️ REINICIAR TODO</button>
        </div>
    </div>
    <div id="tab-s" class="admin-tab" style="display:none">
        <div class="glass-card"><h4>PERSONAL</h4><div id="staff-list"></div><button class="btn-gold" onclick="nuevoEmp()">+ AGREGAR EMPLEADO</button></div>
        <div class="glass-card"><h4>FICHAJES RECIENTES</h4><div id="fichaje-list"></div></div>
    </div>
    <div id="tab-p" class="admin-tab" style="display:none">
        <div class="glass-card"><h4>MENU DE PRODUCTOS</h4><div id="prod-admin-list"></div><button class="btn-gold" onclick="nuevoProd()">+ AGREGAR AL MENU</button></div>
    </div>
</div>

<nav id="navbar">
    <div class="nav-item" id="nav-v" onclick="showView('view-ventas')">💰 VENTAS</div>
    <div id="nav-admin-btn" class="nav-item" style="display:none" onclick="showView('view-admin')">⚙️ ADMIN</div>
    <div class="nav-item" onclick="location.reload()" style="color:var(--danger)">🚪 SALIR</div>
</nav>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
  import { initializeFirestore, persistentLocalCache, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, deleteDoc, doc, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

  const firebaseConfig = { apiKey: "AIzaSyCQEzm6s__cJx2G6_UzBuxh4mmKrhNvAc0", projectId: "churrerialaunica-a2888", appId: "1:721969833627:web:8c0db201407a05f82c483e" };
  const app = initializeApp(firebaseConfig);
  const db = initializeFirestore(app, { localCache: persistentLocalCache() });

  let user = ""; let cart = [];
  let db_local = { productos: [], ventas: [], staff: [], fichajes: [] };

  onSnapshot(collection(db, "productos"), (s) => { db_local.productos = s.docs.map(d => ({id: d.id, ...d.data()})); renderProductos(); renderAdminLists(); });
  onSnapshot(collection(db, "staff"), (s) => { db_local.staff = s.docs.map(d => ({id: d.id, ...d.data()})); renderAdminLists(); });
  onSnapshot(query(collection(db, "ventas"), orderBy("ts", "desc")), (s) => { db_local.ventas = s.docs.map(d => d.data()); renderHistorial(); });
  onSnapshot(query(collection(db, "fichajes"), orderBy("ts", "desc")), (s) => { db_local.fichajes = s.docs.map(d => d.data()); renderAdminLists(); });

  window.handleLogin = async () => {
    const pin = document.getElementById('pin-input').value;
    const pinAdmin = "325606";
    const emp = db_local.staff.find(x => x.p === pin);
    if(!emp && pin !== pinAdmin) return alert("PIN INCORRECTO");
    
    user = (pin === pinAdmin) ? "Admin" : emp.n;
    document.getElementById('view-login').style.display = 'none';
    document.getElementById('navbar').style.display = 'flex';

    if(user === "Admin") {
        document.getElementById('nav-admin-btn').style.display = 'block';
        showView('view-admin');
        document.getElementById('nav-v').style.display = 'none';
    } else {
        document.getElementById('welcome-msg').innerText = "HOLA, " + user.toUpperCase();
        showView('view-ventas');
        await addDoc(collection(db, "fichajes"), { u: user, f: new Date().toLocaleDateString(), h: new Date().toLocaleTimeString(), tipo: "ENTRADA", ts: serverTimestamp() });
    }
  };

  window.renderProductos = () => {
    document.getElementById('grid-productos').innerHTML = db_local.productos.map(p => `
      <div class="btn-item" onclick="addCart('${p.n}', ${p.p})"><span>🍩</span>${p.n}<br>$${p.p}</div>
    `).join('');
  };

  window.addCart = (n, p) => { cart.push({n, p}); renderCart(); };
  
  window.renderCart = () => {
    document.getElementById('cart-list').innerHTML = cart.map((item, i) => `
        <div class="cart-row">
            <span>${item.n} ($${item.p})</span>
            <button class="btn-del" onclick="cart.splice(${i},1);renderCart()" style="padding: 5px 10px; font-size: 1rem;">🗑</button>
        </div>
    `).join('');
    const t = cart.reduce((a,b)=>a+b.p, 0);
    document.getElementById('total-val').innerText = "$"+t; calcVuelto();
  }

  window.calcVuelto = () => {
    const t = cart.reduce((a,b)=>a+b.p, 0);
    const p = document.getElementById('paga-con').value || 0;
    document.getElementById('vuelto-val').innerText = "$" + Math.max(0, p - t);
  };

  window.confirmarVenta = async () => {
    if(!cart.length) return;
    await addDoc(collection(db, "ventas"), { t: cart.reduce((a,b)=>a+b.p,0), u: user, m: document.getElementById('metodo-pago').value, f: new Date().toLocaleDateString(), h: new Date().toLocaleTimeString(), ts: serverTimestamp(), tr: (new Date().getHours() < 14 ? "Mañana" : "Tarde") });
    cart = []; document.getElementById('paga-con').value = ""; renderCart(); alert("VENTA CONFIRMADA");
  };

  window.registrarSalida = async () => {
    if(confirm("¿CERRAR TURNO?")){ await addDoc(collection(db, "fichajes"), { u: user, f: new Date().toLocaleDateString(), h: new Date().toLocaleTimeString(), tipo: "SALIDA", ts: serverTimestamp() }); location.reload(); }
  };

  window.switchTab = (t, btn) => {
    document.querySelectorAll('.admin-tab').forEach(x => x.style.display = 'none');
    document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
    document.getElementById('tab-'+t).style.display = 'block';
    btn.classList.add('active');
    renderAdminLists();
  };

  function renderAdminLists() {
    const sList = document.getElementById('staff-list');
    if(sList) sList.innerHTML = db_local.staff.map(s => `<div class="list-item"><span>${s.n} (PIN: ${s.p})</span><button class="btn-del" onclick="delDoc('staff','${s.id}')">🗑</button></div>`).join('');
    const fList = document.getElementById('fichaje-list');
    if(fList) fList.innerHTML = `<table>` + db_local.fichajes.slice(0,8).map(f => `<tr><td>${f.u}</td><td>${f.f}</td><td style="color:var(--gold)">${f.tipo}</td></tr>`).join('') + `</table>`;
    const pList = document.getElementById('prod-admin-list');
    if(pList) pList.innerHTML = db_local.productos.map(p => `<div class="list-item"><span>🍩 ${p.n} ($${p.p})</span><button class="btn-del" onclick="delDoc('productos','${p.id}')">🗑</button></div>`).join('');
  }

  window.renderHistorial = () => {
    const f = document.getElementById('filtro-h').value;
    const hoy = new Date().toLocaleDateString();
    let lista = (f === 'hoy') ? db_local.ventas.filter(v => v.f === hoy) : db_local.ventas;
    const res = document.getElementById('historial-resumen');
    if(res) res.innerHTML = `<p style="opacity:0.6; margin:0;">TOTAL ACUMULADO</p><h2 style="color:var(--gold); margin:5px 0;">$${lista.reduce((a,b)=>a+b.t,0)}</h2>`;
    const hList = document.getElementById('historial-list');
    if(hList) hList.innerHTML = `<table><tr><th>HORA</th><th>PAGO</th><th>TOTAL</th></tr>` + lista.slice(0,15).map(v => `<tr><td>${v.h}</td><td>${v.m}</td><td style="font-weight:bold">$${v.t}</td></tr>`).join('') + `</table>`;
  };

  window.delDoc = async (col, id) => { if(confirm("¿Eliminar?")) await deleteDoc(doc(db, col, id)); };

  window.reiniciarSistema = async () => {
    if(confirm("⚠️ ¿BORRAR TODAS LAS VENTAS?")){
        const batch = writeBatch(db);
        const vSnap = await getDocs(collection(db, "ventas")); vSnap.forEach(d => batch.delete(d.ref));
        const fSnap = await getDocs(collection(db, "fichajes")); fSnap.forEach(d => batch.delete(d.ref));
        await batch.commit(); alert("BASE DE DATOS LIMPIA");
    }
  };

  window.nuevoEmp = async () => { const n = prompt("Nombre:"); const p = prompt("PIN:"); if(n && p) await addDoc(collection(db, "staff"), { n, p }); };
  window.nuevoProd = async () => { const n = prompt("Producto:"); const p = parseInt(prompt("Precio:")); if(n && p) await addDoc(collection(db, "productos"), { n, p }); };

  window.showView = (id) => {
    document.querySelectorAll('.container').forEach(c => c.style.display = 'none');
    document.getElementById(id).style.display = 'block';
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    if(id === 'view-ventas') document.getElementById('nav-v').classList.add('active');
    if(id === 'view-admin') {
        document.getElementById('nav-admin-btn').classList.add('active');
        renderAdminLists();
    }
  };
</script>
</body>
</html>
